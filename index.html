<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub | Digital Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>(function(){ emailjs.init("aVLHyVhILMDCu8T99"); })();</script> <style>
        :root { --primary: #00a8ff; --bg: #020617; --card: rgba(15, 23, 42, 0.95); --border: rgba(255,255,255,0.1); --text: #ffffff; --sub: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-y: auto; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; position: relative; z-index: 1; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary); margin: auto; display: block; background: #000; cursor: pointer; }
        
        .social-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .s-link { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; background: var(--card); border: 1px solid var(--border); font-size: 1.3rem; }
        
        .item-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        .add-btn:disabled { background: #1e293b !important; color: #64748b !important; cursor: not-allowed; opacity: 0.6; }
        .oos-tag { color: #ff4d4d; font-size: 0.7rem; font-weight: 800; border: 1px solid #ff4d4d; padding: 2px 4px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg); padding: 25px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--primary); text-align: center; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        
        .admin-controls { background: #ffae0022; padding: 15px; border-radius: 12px; border: 1px dashed #ffae00; margin-bottom: 15px; font-size: 0.8rem; text-align: center; }
        footer { margin-top: 50px; text-align: center; font-size: 0.8rem; color: var(--sub); font-weight: bold; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; display: none; z-index: 3000; font-weight: bold; }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="toast" class="toast">Info Copied! ❤️</div>

<div class="container">
    <div id="maintenance-msg" style="display:none; text-align:center; color:#ff4d4d; font-weight:bold; margin-bottom:20px; border:1px solid #ff4d4d; padding:10px; border-radius:10px;">⚠️ SHOP CLOSED FOR MAINTENANCE</div>
    
    <div class="header" style="text-align:center;">
        <img src="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400" class="logo" onclick="logoTrigger()">
        <h2 style="color:var(--primary); margin-top:10px; letter-spacing: 2px;">CYBERHUB</h2>
    </div>

    <div class="social-bar">
        <a href="https://wa.me/21629895846" class="s-link">📞</a>
        <a href="https://www.instagram.com/__cyber__hub__" class="s-link">📸</a>
        <a href="mailto:cyber.hub.contact.now@gmail.com" class="s-link">📧</a>
    </div>

    <div id="admin-panel" style="display:none;" class="admin-controls">
        <b style="color:#ffae00; font-size:1rem;">🔓 ADMIN PORTAL</b><br><br>
        <button onclick="toggleMaintenance()" style="padding:8px; border-radius:5px; border:none; cursor:pointer; font-weight:bold;">Toggle Maintenance</button>
        <button onclick="addNewItemPrompt()" style="padding:8px; border-radius:5px; border:none; cursor:pointer; font-weight:bold;">+ Add New Item</button>
    </div>

    <input type="text" id="mainSearch" placeholder="Search / Rechercher..." onkeyup="filterItems()" style="border-radius:15px;">
    <div id="content-area"></div>
    <div style="text-align:center; margin-top:20px; cursor:pointer; font-weight:bold; color:var(--primary); background:var(--card); padding:15px; border-radius:15px; border:1px solid var(--primary);" onclick="openCart()">
        🛒 View Cart (<span id="cart-count">0</span>)
    </div>
    
    <footer>Made by Yessine Ben Fraj with ❤️</footer>
</div>

<div id="modal">
    <div class="modal-content">
        <div id="cart-view">
            <h3>🛒 Mon Panier</h3>
            <div id="cart-items-list" style="text-align:left; max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="margin:15px 0; padding-top:10px; border-top:1px solid var(--border); font-weight:bold; display:flex; justify-content:space-between;">
                <span>Total:</span><span><span id="cart-total-price">0</span> DT</span>
            </div>
            <input type="text" id="custName" placeholder="Full Name / Nom">
            <input type="text" id="custContact" placeholder="Phone / Social Handle">
            <button class="add-btn" onclick="submitOrder()">Place Order & Copy Info</button>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--sub); margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE"; 
    const ADMIN_PASS = "1234"; // Default Password
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRfkUtzcSKcO8fKFVvqCUGU221FL8_h2s3f3E6OXfMJJm3rYTTt_Foi9AurxvLquOFsBbW5h4VVyRF/pub?output=csv";

    let productsData = { categories: [] };
    let cart = JSON.parse(localStorage.getItem('cyberhub_cart')) || [];
    let isAdmin = false;
    let clickCount = 0;

    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "size": { "value": 1.5 }, "line_linked": { "opacity": 0.2 }, "move": { "speed": 1.2 } } });

    // --- BIOMETRIC PASSKEY & ADMIN LOGIN LOGIC ---
    async function logoTrigger() {
        clickCount++;
        if(clickCount === 5) {
            clickCount = 0;
            // 1. Check if Passkey Exists
            if (localStorage.getItem('admin_passkey_id')) {
                const success = await loginWithPasskey();
                if (success) return grantAdmin();
            }
            // 2. Fallback to Password
            const pass = prompt("Enter Password (or type 'PASSKEY' to set up fingerprint/face ID):");
            if (pass === ADMIN_PASS) {
                grantAdmin();
            } else if (pass && pass.toUpperCase() === "PASSKEY") {
                const verify = prompt("Verify Password to register device:");
                if (verify === ADMIN_PASS) { await registerPasskey(); grantAdmin(); }
                else alert("Incorrect verification.");
            } else if (pass) {
                alert("Incorrect Password.");
            }
        }
    }

    function grantAdmin() {
        isAdmin = true;
        document.getElementById('admin-panel').style.display = 'block';
        alert("🔓 Admin Access Granted!");
        showCats(); // Refresh view
    }

    async function registerPasskey() {
        try {
            const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
            const credential = await navigator.credentials.create({
                publicKey: {
                    challenge: challenge, rp: { name: "CyberHub Admin" },
                    user: { id: new Uint8Array(16), name: "admin", displayName: "Administrator" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                    timeout: 60000
                }
            });
            localStorage.setItem('admin_passkey_id', btoa(String.fromCharCode(...new Uint8Array(credential.rawId))));
            alert("✅ Device registered! You can now use Fingerprint/FaceID to log in.");
        } catch(e) { alert("Registration failed or canceled."); }
    }

    async function loginWithPasskey() {
        try {
            const credIdBase64 = localStorage.getItem('admin_passkey_id');
            const credId = Uint8Array.from(atob(credIdBase64), c => c.charCodeAt(0));
            const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
            await navigator.credentials.get({
                publicKey: { challenge: challenge, allowCredentials: [{ type: "public-key", id: credId }], userVerification: "required", timeout: 60000 }
            });
            return true;
        } catch(e) { return false; }
    }

    // --- SHEET DATA FETCHER (BULLETPROOF) ---
    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            let temp = {};

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 6) {
                    const cat = cols[0]; const catImg = cols[1];
                    const sub = cols[2]; const subImg = cols[3];
                    const itemName = cols[4]; const price = cols[5];

                    // Bulletproof Check: Looks anywhere in the row for 'YES' and 'OOS'
                    const isOOS = cols.some(c => c && c.toUpperCase() === "OOS");
                    const showInput = cols.some(c => c && c.toUpperCase() === "YES");
                    
                    let inputPlaceholder = "...";
                    if(showInput) {
                        const yesIdx = cols.findIndex(c => c && c.toUpperCase() === "YES");
                        if(yesIdx !== -1 && cols[yesIdx + 1] && cols[yesIdx + 1] !== "OOS") { inputPlaceholder = cols[yesIdx + 1]; }
                    }

                    if (!temp[cat]) temp[cat] = { name: cat, img: catImg, apps: {} };
                    if (!temp[cat].apps[sub]) temp[cat].apps[sub] = { name: sub, img: subImg, items: [] };
                    
                    temp[cat].apps[sub].items.push({ name: itemName, price: price, isOOS: isOOS, showInput: showInput, placeholder: inputPlaceholder });
                }
            });
            productsData.categories = Object.values(temp).map(c => { c.apps = Object.values(c.apps); return c; });
            showCats();
        } catch (e) { document.getElementById('content-area').innerHTML = "<p style='text-align:center; color:red;'>Error Loading Shop Data.</p>"; }
    }

    // --- ADMIN GOOGLE APPS SCRIPT FUNCTIONS ---
    async function syncToSheet(payload) {
        if(SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") { alert("You must link your Apps Script URL in the code!"); return; }
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("✅ Synced with Google Sheets!");
        fetchData();
    }
    function updateItem(name, price, isOOS) { syncToSheet({ action: "update", itemName: name, newPrice: price, isOOS: isOOS }); }
    function addNewItemPrompt() {
        const cat = prompt("Category Name (Fr):"); const app = prompt("App Name (Fr):");
        const name = prompt("Item Name:"); const price = prompt("Price (Ex: 15 DT):");
        if(cat && app && name && price) syncToSheet({ action: "add", cat: cat, app: app, name: name, price: price });
    }
    function toggleMaintenance() {
        const msg = document.getElementById('maintenance-msg');
        msg.style.display = msg.style.display === 'none' ? 'block' : 'none';
        alert(msg.style.display === 'block' ? "Shop Closed to Customers." : "Shop Opened.");
    }

    // --- UI & RENDER LOGIC ---
    function showCats() { document.getElementById('content-area').innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">${productsData.categories.map((c, i) => `<div class="nav-card" onclick="showApps(${i})"><img src="${c.img}" style="width:60px;"><br>${c.name}</div>`).join('')}</div>`; }
    function showApps(idx) { const c = productsData.categories[idx]; document.getElementById('content-area').innerHTML = `<button onclick="showCats()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:10px;">← Back</button><div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">${c.apps.map((a, i) => `<div class="nav-card" onclick="showItems(${idx}, ${i})"><img src="${a.img}" style="width:50px;"><br>${a.name}</div>`).join('')}</div>`; }
    function showItems(cI, aI) {
        const a = productsData.categories[cI].apps[aI];
        document.getElementById('content-area').innerHTML = `<button onclick="showApps(${cI})" style="background:none; border:none; color:var(--primary); cursor:pointer;">← Back</button>` + 
        a.items.map((it, i) => `
            <div class="item-row">
                <span style="font-size:0.9rem;">${it.name} ${it.isOOS ? '<span class="oos-tag">OOS</span>' : ''}</span>
                <b style="color:var(--primary);">${it.price}</b>
                ${it.showInput && !it.isOOS ? `<input type="text" id="in-${cI}-${aI}-${i}" placeholder="${it.placeholder}">` : ''}
                ${isAdmin ? `
                    <div style="margin-top:10px; border-top:1px dashed #444; padding-top:10px;">
                        <button onclick="updateItem('${it.name}', '${it.price}', ${!it.isOOS})" style="padding:5px; font-size:0.7rem;">Toggle OOS</button>
                        <button onclick="var p=prompt('New Price?'); if(p) updateItem('${it.name}', p, ${it.isOOS})" style="padding:5px; font-size:0.7rem;">Edit Price</button>
                    </div>` : ''}
                <button class="add-btn" onclick="addToCart(${cI},${aI},${i})" ${it.isOOS || (document.getElementById('maintenance-msg').style.display === 'block' && !isAdmin) ? 'disabled' : ''}>${it.isOOS ? 'OUT OF STOCK' : 'ADD TO CART'}</button>
            </div>`).join('');
    }

    // --- CART & ORDER LOGIC ---
    function addToCart(c,a,i) { 
        const it = productsData.categories[c].apps[a].items[i];
        const val = document.getElementById(`in-${c}-${a}-${i}`) ? document.getElementById(`in-${c}-${a}-${i}`).value : "N/A";
        cart.push({name: it.name, price: parseFloat(it.price) || 0, note: val});
        document.getElementById('cart-count').innerText = cart.length;
        localStorage.setItem('cyberhub_cart', JSON.stringify(cart));
    }
    function openCart() { 
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('cart-items-list').innerHTML = cart.map(i => `<div>• ${i.name} <i>(${i.note})</i></div>`).join('');
        document.getElementById('cart-total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function submitOrder() {
        const orderID = "CH-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        const name = document.getElementById('custName').value;
        const contact = document.getElementById('custContact').value;
        const total = document.getElementById('cart-total-price').innerText;
        const items = cart.map(i => `${i.name}`).join(' | ');
        const notes = cart.map(i => i.note).join(' | ');

        // ZAPIER-FRIENDLY STRUCTURE
        const body = `ORDER_ID: ${orderID}\nCLIENT: ${name}\nCONTACT: ${contact}\nITEMS: ${items}\nNOTES: ${notes}\nPRICE: ${total} DT`;

        navigator.clipboard.writeText(body).then(() => {
            const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
            emailjs.send("service_tjvcxv4", "template_r8b7yaf", { message_body: body }).then(() => {
                alert(`Order Sent! ID: ${orderID}`);
                cart = []; localStorage.removeItem('cyberhub_cart'); location.reload();
            });
        });
    }

    fetchData();
    document.getElementById('cart-count').innerText = cart.length;
</script>
</body>
</html>
