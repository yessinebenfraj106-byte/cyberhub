                if(Date.now()<endMs){

                        let h=Math.floor(diff/3600000);let mins=Math.floor((diff%3600000)/60000);let s=Math.floor((diff%60000)/1000);

                    },1000);

// ONE TIME STREAK BURN & MISSED DAY PENALTY
function checkStreak(){
    if(!user)return 0;
    if(streakUsed)return 0;
    
    let lastLogStr=localStorage.getItem('ch_last_log');let streak=parseInt(localStorage.getItem('ch_streak')||0);let today=new Date().toDateString();
    if(lastLogStr===today)return streak; 
    
    let yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    
    // MISSED DAY RESET TO ZERO
    if (lastLogStr !== yesterday.toDateString() && lastLogStr) { streak = 0; }
    
    let n1=Math.floor(Math.random()*10)+1;let n2=Math.floor(Math.random()*10)+1;captchaCorrect=n1+n2;
    if(el('cap-math'))el('cap-math').innerText=`${n1} + ${n2} = ?`;
    window.tempStreakObj={current:streak,today:today};
    openModal('captcha-mod');return streak;
}

function verifyCaptcha(){
    let ans=parseInt(el('cap-ans').value);

        let obj=window.tempStreakObj;let finalStreak=obj.current+1;

    let wrnHtml=i.wrn?`<div style="color:var(--w);font-size:0.75rem;margin-top:5px;font-weight:bold;">⚠️ ${i.wrn}</div>`:'';
    let extHtml=i.exReq?`<input type="text" id="ex-${i.id}" placeholder="${i.exTxt}" style="margin-bottom:5px;padding:8px;font-size:0.85rem;width:100%;">`:'';
    let btnCol=i.col||'var(--p)';
    let catHtml=(i.cat&&i.sub)?`<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">${i.cat} <span style="color:${btnCol};opacity:0.8;">▶</span> ${i.sub}</div>`:'';
    let b=i.oos?`<button class="btn" style="background:#333;color:#777;margin:0;" disabled><span class="tr" data-k="oos">${T[lang].oos}</span></button>`:`<button class="btn" style="margin:0;background:${btnCol};color:#000;" onclick="addC('${eO}',${i.p},'${eN}',${i.exReq})"><span class="tr" data-k="add">${T[lang].add}</span></button>`;
    let nDisp=q?highlightMatch(i.n,q):i.n;
    let admBar="";
    if(role==='Admin'){admBar=`<div class="admin-live-edit"><span class="admin-drag-handle" title="Drag to Reorder">☰</span><input type="text" class="admin-edit-inp" value="${i.n}" onchange="pAPI('upd_item',{id:'${i.id}', nEn:this.value}, true); db.inv.find(x=>x[0]==='${i.id}')[10]=this.value; toast(T[lang].svd, false);" style="flex:1;"><input type="number" class="admin-edit-inp" value="${i.p}" onchange="pAPI('upd_item',{id:'${i.id}', p:this.value}, true); db.inv.find(x=>x[0]==='${i.id}')[12]=this.value; toast(T[lang].svd, false);" style="width:60px;"><button class="btn admin-edit-btn" style="background:${i.oos?'#ff4d4d':'#00ff88'};color:#000;" onclick="let s=this.innerText==='OOS'; pAPI('upd_item',{id:'${i.id}',oos:!s}, true); this.innerText=s?'IN STOCK':'OOS'; this.style.background=s?'#00ff88':'#ff4d4d'; db.inv.find(x=>x[0]==='${i.id}')[13]=s?'In Stock':'OOS';">${i.oos?'OOS':'IN STOCK'}</button></div>`;}
    return `<div class="i-row" style="border-left:3px solid ${btnCol};" data-id="${i.id}"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div style="flex:1;">${catHtml}<span style="font-weight:900;font-size:1.15rem;color:#fff;">${nDisp}</span> ${i.oos?'<span class="oos-tag">OOS</span>':''}<br><span style="color:rgba(255,255,255,0.4);font-size:0.75rem;font-family:monospace;">ID: ${i.id}</span><br><b style="color:${btnCol};font-size:1.25rem;margin-top:3px;display:block;">${i.p} DT</b>${wrnHtml}</div><div style="width:140px;text-align:right;margin-left:10px;">${extHtml}${b}</div></div>${admBar}</div>`;
}

function addC(eO,p,eN,hasEx){let id=decodeURIComponent(eO);let n=decodeURIComponent(eN);if(hasEx){let inp=el('ex-'+id);if(!inp||!inp.value)return toast(T[lang].fill,true);n+=" ("+inp.value+")";inp.value='';}cart.push({id:id,n:n,p:parseFloat(p)});if(el('c-count'))el('c-count').innerText=cart.length;openModal('cart-prompt-mod');}
function appPrm(){let pc=el('pInp').value.toUpperCase();if(db.promo&&db.promo[pc]){pCode=pc;pPct=db.promo[pc];toast(T[lang].scs,false);updC();}else toast(T[lang].bdc,true);}

function updC(){
    let r=cart.reduce((s,i)=>s+i.p,0); 
    
    let dayNames=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    let todayName=dayNames[new Date().getDay()];
    let dD=(db.promo&&db.promo[todayName])?db.promo[todayName]:0;
    
    let l=chkLoy();let f=globalFlashPct||0;
    let s=(loginStreak>=14 && !streakUsed)?5:0;
    let autoDisc=Math.max(l,f,s,dD); 
    
    if(autoDisc>0){pPct=0;pCode="";}
    let h=Math.max(autoDisc,pPct); 
    if(el('m-sub'))el('m-sub').innerText=r.toFixed(2)+" DT"; 
    
    let pr=el('m-pr');let lr=el('m-lr');let loyB=el('loy-cart-badge');let flaB=el('flash-cart-badge');let strB=el('streak-cart-badge');let dalB=el('daily-cart-badge');
    if(loyB)loyB.style.display='none';if(flaB)flaB.style.display='none';if(strB)strB.style.display='none';if(dalB)dalB.style.display='none';
    
    if(el('promo-box'))el('promo-box').style.display=(autoDisc>0)?'none':'flex';

    if(pPct>0){if(pr)pr.style.display='flex';if(el('m-pp'))el('m-pp').innerText=pPct;if(el('m-pv'))el('m-pv').innerText="-"+(r*(pPct/100)).toFixed(2)+" DT";}else{if(pr)pr.style.display='none';}
    
    if(autoDisc>0){
        if(lr)lr.style.display='flex';if(el('m-lp'))el('m-lp').innerText=autoDisc;if(el('m-lv'))el('m-lv').innerText="-"+(r*(autoDisc/100)).toFixed(2)+" DT";
        if(autoDisc===f&&flaB)flaB.style.display='block';
        else if(autoDisc===s&&s>l&&s>dD&&strB)strB.style.display='block';
        else if(autoDisc===dD&&dD>l&&dalB)dalB.style.display='block';
        else if(loyB)loyB.style.display='block';
    }else{if(lr)lr.style.display='none';}
    
    if(el('m-tot'))el('m-tot').innerText=(r-(r*(h/100))).toFixed(2)+" DT";if(el('c-list'))el('c-list').innerHTML=cart.map(i=>`<div style="padding:5px 0;border-bottom:1px solid #333;">• ${i.n} (${i.p} DT)</div>`).join('');
}

function opnCart(){updC();openModal('cart-mod');}
function sPay(m){payM=m;['p-d17','p-mm','p-csh','p-wal'].forEach(x=>{if(el(x))el(x).classList.remove('act')});let target=el(m==='D17'?'p-d17':m==='Mandat Minute'?'p-mm':m==='Wallet'?'p-wal':'p-csh');if(target)target.classList.add('act');let inst=el('pay-inst');let proofSec=el('proof-section');let dbox=el('d-box-pay');if(m==='D17'||m==='Mandat Minute'){if(dbox)dbox.style.display='block';if(proofSec)proofSec.style.display='block';if(m==='D17'&&inst){inst.innerHTML=`<span class="tr" data-k="d17Inst">${T[lang].d17Inst}</span> <b style="color:var(--w);font-size:1.3rem;letter-spacing:2px;display:block;margin-top:5px;">21 357 058</b>`;}if(m==='Mandat Minute'&&inst){inst.innerHTML=`<span class="tr" data-k="mmInst">${T[lang].mmInst}</span> <b style="color:var(--w);font-size:1.2rem;display:block;margin-top:5px;">${T[lang].mmName}</b><b style="color:var(--p);font-size:1.3rem;letter-spacing:2px;display:block;">${T[lang].mmNum}</b>`;}}else{if(dbox)dbox.style.display='none';}}
function toggleProof(isLate){if(el('proof-inputs'))el('proof-inputs').style.display=isLate?'none':'block';if(isLate){proofB64="";if(el('co-proof-file'))el('co-proof-file').value="";if(el('co-tx-id'))el('co-tx-id').value="";}}
function handleProofUpload(e){let f=e.target.files[0];if(!f)return;let reader=new FileReader();reader.onload=function(ev){proofB64=ev.target.result;};reader.readAsDataURL(f);}
function sCon(c){cM=c;['wa','ig','fb'].forEach(x=>{if(el('c-'+x))el('c-'+x).classList.remove('act')});if(el('c-'+c))el('c-'+c).classList.add('act');let inp=el('coC');if(!inp)return;if(c==='wa'){inp.placeholder=T[lang].entWa;}else if(c==='ig'){inp.placeholder=T[lang].entIg;}else if(c==='fb'){inp.placeholder=T[lang].entFb;}}
function opnCO(){if(cart.length===0)return toast(T[lang].emp,true);closeModal('cart-mod');if(uIg)el('coC').value=uIg;else if(uWa)el('coC').value=uWa;else if(uFb)el('coC').value=uFb;openModal('co-mod');}

async function finOrd(){
    if(!checkRateLimit())return;
    let n=el('coN').value;let c=el('coC').value;let cm=el('coNts').value;if(!n||!c)return toast(T[lang].rq,true);
    let txId=el('co-tx-id').value;let isLate=el('co-pay-later').checked;if((payM==='D17'||payM==='Mandat Minute')&&!isLate&&!txId&&!proofB64){return toast(T[lang].provId,true);}
    
    let l=chkLoy();let f=globalFlashPct||0;let s=(loginStreak>=14&&!streakUsed)?5:0;
    let dayNames=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    let dD=(db.promo&&db.promo[dayNames[new Date().getDay()]])?db.promo[dayNames[new Date().getDay()]]:0;
    let h=Math.max(pPct,l,f,s,dD);
    
    let total=0;cart.forEach(i=>{i.finalPrice=i.p-(i.p*(h/100));total+=i.finalPrice;});
    if(payM==='Wallet'&&userWallet<total){return toast(T[lang].noFunds,true);}
    if(el('b-fin')){el('b-fin').innerHTML=`<span class="tr" data-k="plc">...</span>`;el('b-fin').disabled=true;}
    
    try{
        let d=await customFetch(window.SURL,{method:'POST',body:JSON.stringify({act:"place_order",client:n,plat:cM,contact:c,items:cart,promo:pCode,loy:h,comments:cm,c:user||"Guest",payM:payM,payLater:isLate,txId:txId,proofB64:proofB64})});
        if(d&&d.s==="insufficient_funds"){if(el('b-fin')){el('b-fin').innerHTML=`<span class="tr" data-k="plc">${T[lang].plc}</span>`;el('b-fin').disabled=false;}return toast(T[lang].noFunds,true);}
        if(d&&d.s==="ok"){
            if(d.isPaid&&payM==='Wallet'){userWallet-=total;localStorage.setItem('ch_wal',userWallet);chkUI();}
            
            // BURN STREAK AFTER USE
            if(h === s && s > 0) { localStorage.setItem('ch_str_u','1'); streakUsed=true; loginStreak=0; localStorage.setItem('ch_streak',0); }
            
            let invoice=`🛒 *CYBERHUB ORDER*\n\n*Order Group ID:* ${d.gId}\n*Total Amount:* ${total.toFixed(2)} DT\n\n*--- ITEMS ---*\n`;cart.forEach(i=>{invoice+=`🔹 ${i.n}\n   ID: ${i.id}\n   Price: ${i.finalPrice.toFixed(2)} DT\n\n`;});invoice+=`Status: ${d.isPaid?'Paid via Wallet ✅':'Pending Payment ⏳'}`;navigator.clipboard.writeText(invoice).catch(e=>{});
            if(el('co-form'))el('co-form').style.display='none';if(el('co-succ'))el('co-succ').style.display='block';if(el('succ-gid'))el('succ-gid').innerText=d.gId;
            let dmLinks={wa:`https://wa.me/21629895846?text=${encodeURIComponent(invoice)}`,ig:"https://www.instagram.com/__cyber__hub__/?utm_source=ig_web_button_share_sheet",fb:"https://m.me/yessine_ben_fraj"};if(el('dm-btn')){el('dm-btn').onclick=()=>{window.open(dmLinks[cM]||dmLinks.wa);};}
            cart=[];if(el('c-count'))el('c-count').innerText="0";if(user){uOrders++;localStorage.setItem('ch_ord',uOrders);chkUI();}toast(T[lang].invCop,false);
        }
        if(el('b-fin')){el('b-fin').innerHTML=`<span class="tr" data-k="plc">${T[lang].plc}</span>`;el('b-fin').disabled=false;}
    }catch(e){if(el('b-fin')){el('b-fin').innerHTML=`<span class="tr" data-k="plc">${T[lang].plc}</span>`;el('b-fin').disabled=false;}toast(T[lang].err,true);}
}

// MULTI-ACCOUNT CRM DETECTOR & BANNER
function fAdm(t){
    customFetch(window.SURL+"?action=get_admin").then(d=>{
        if(!d||d.status!=='success')return;
        let html=`<h3 style="color:var(--w);">${t.toUpperCase()}</h3>`;
        if(t==='orders')d.ord.forEach(o=>html+=`<div class="glass">${o[2]} - ${o[5]} - ${o[10]}</div>`);
        if(t==='spins')d.spn.forEach(s=>html+=`<div class="glass">${s[1]} - ${s[4]} - ${s[5]}</div>`);
        if(t==='users') {
            let ipCounts = {};
            d.usr.forEach(u => { let ip = u[9]; if(ip) ipCounts[ip] = (ipCounts[ip]||0)+1; });
            d.usr.forEach(u => {
                let ip = u[9] || "No IP Logged";
                let isMulti = ipCounts[ip] > 1;
                let bg = isMulti ? "rgba(255,0,0,0.2)" : "rgba(255,255,255,0.05)";
                let border = isMulti ? "1px dashed #ff4d4d" : "1px solid var(--b)";
                let warn = isMulti ? `<b style="color:#ff4d4d;">⚠️ MULTI-ACCOUNT</b>` : "";
                let banBtn = isMulti ? `<button onclick="pAPI('ban_ip',{ip:'${ip}',reason:'Multi-Account System Flag'},true)" style="background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px;font-weight:bold;margin-top:5px;cursor:pointer;">🔨 BAN THIS IP</button>` : "";
                html+=`<div class="glass" style="background:${bg}; border:${border}; text-align:left;"><b>${u[0]}</b> (${u[3]})<br><span style="font-family:monospace;font-size:0.8rem;color:var(--sub);">IP: ${ip}</span> ${warn}<br>${banBtn}</div>`;
            });
        }
        el('d-box').innerHTML=html;openModal('d-mod');closeModal('adm-dash');
    });
}

function drawCharts(){
    if(typeof Chart==='undefined')return setTimeout(drawCharts,500);if(!db.ord||db.ord.length===0)return;let dC={"Gaming":0,"Streaming":0,"Other":0};let rD={};
    db.ord.slice(1).forEach(o=>{if(o.length>3){let ir=String(o[5]).toLowerCase();if(ir.includes("netflix")||ir.includes("spotify"))dC["Streaming"]++;else if(ir.includes("valorant")||ir.includes("gta"))dC["Gaming"]++;else dC["Other"]++;if(o[10]==="Delivered"){let dt=new Date(o[11]).toLocaleDateString(undefined,{weekday:'short',day:'numeric'});let p=parseFloat(String(o[9]).replace(/[^0-9.]/g,''));if(!isNaN(p))rD[dt]=(rD[dt]||0)+p;}}});
    if(c1)c1.destroy();if(el('admC')){c1=new Chart(el('admC'),{type:'doughnut',data:{labels:Object.keys(dC),datasets:[{data:Object.values(dC),backgroundColor:['#00f0ff','#ffae00','#fff']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#fff'}}}}});}
    if(c2)c2.destroy();let rK=Object.keys(rD).slice(-7);let rV=rK.map(k=>rD[k]);if(el('revC')){c2=new Chart(el('revC'),{type:'bar',data:{labels:rK,datasets:[{data:rV,backgroundColor:'#00ff88',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}},plugins:{legend:{display:false}}}});}
}
