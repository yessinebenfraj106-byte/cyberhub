function addC(eO, p, eN, hasEx, exCount) {
    let id = decodeURIComponent(eO); let n = decodeURIComponent(eN);
    
    if(hasEx) { 
        let extVals = [];
        let missing = false;
        for(let j=0; j<exCount; j++) { 
            let inp = el(`ex-${id}-${j}`); 
            if(!inp || !inp.value) { missing = true; }
            else { extVals.push(inp.value); inp.value = ''; }
        }
        
        // IF THEY MISS A BOX, APPEND A WARNING TO THE NAME IN CART
        if(missing) { n += " (⚠️ MISSING INFO)"; } 
        else { n += " (" + extVals.join(' | ') + ")"; }
    }
    
    cart.push({ id: id, n: n, p: parseFloat(p) }); 
    localStorage.setItem('ch_cart', JSON.stringify(cart));
    if(user) pAPI('save_cart', { c: user, cart: JSON.stringify(cart) }, true);
    
    if(el('c-count')) el('c-count').innerText = cart.length; 
    openModal('cart-prompt-mod');
}

function updC() {
    let r = cart.reduce((s, i) => s + i.p, 0); 
    
    let dayNames = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY']; 
    let todayName = dayNames[new Date().getDay()];
    let dD = (db.promo && db.promo[todayName]) ? db.promo[todayName] : 0;
    
    let l = chkLoy(); let f = globalFlashPct || 0; let s = (loginStreak >= sysStreakDays && !streakUsed) ? sysStreakPct : 0;
    let autoDisc = Math.max(l, f, s, dD); 
    
    if(autoDisc > 0) { pPct = 0; pCode = ""; }
    let h = Math.max(autoDisc, pPct); 
    if(el('m-sub')) el('m-sub').innerText = r.toFixed(2) + " DT"; 
    
    let pr = el('m-pr'); let lr = el('m-lr'); let loyB = el('loy-cart-badge'); let flaB = el('flash-cart-badge'); let strB = el('streak-cart-badge'); let dalB = el('daily-cart-badge');

    if(autoDisc > 0) {

        if(autoDisc === f && flaB) flaB.style.display = 'block';
        else if(autoDisc === s && s > l && s > dD && strB) strB.style.display = 'block';
        else if(autoDisc === dD && dD > l && dalB) dalB.style.display = 'block';
        else if(loyB) loyB.style.display = 'block';
    } else { if(lr) lr.style.display = 'none'; }
    
    if(el('m-tot')) el('m-tot').innerText = (r - (r * (h / 100))).toFixed(2) + " DT"; 
    
    // RENDER CART LIST AND HIGHLIGHT MISSING INFO IN RED
    if(el('c-list')) {
        el('c-list').innerHTML = cart.map(i => {
            let nHtml = i.n;
            if(nHtml.includes("⚠️ MISSING INFO")) {

        }).join('');
    }
    
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    if(user) pAPI('save_cart', { c: user, cart: JSON.stringify(cart) }, true);
}

                let warn = isMulti ? `<b style="color:#ff4d4d;">⚠️ MULTI-ACCOUNT</b>` : "";
                let banBtn = isMulti ? `<button onclick="pAPI('ban_ip',{ip:'${ip}',reason:'Multi-Account System Flag'},true)" style="background:#ff4d4d;color:#fff;border:none;padding:5px 10px;border-radius:5px;font-weight:bold;margin-top:5px;cursor:pointer;">🔨 BAN THIS IP</button>` : "";
                html += `<div class="glass" style="background:${bg}; border:${border}; text-align:left;"><b>${u[0]}</b> (${u[2]})<br><span style="font-family:monospace;font-size:0.8rem;color:var(--sub);">IP: ${ip}</span> ${warn}<br>${banBtn}</div>`;
            });
        }
        el('d-box').innerHTML = html; openModal('d-mod'); closeModal('adm-dash');
    });
}

function openAdminDash() { openModal('adm-dash'); setTimeout(drawCharts, 500); }
function loadInvToSel() { let s = el('mo-sel'); s.innerHTML = '<option value="CUSTOM">-- Custom --</option>'; db.inv.slice(1).forEach(r => { if(r[10]) s.innerHTML += `<option value="${sEnc(r[10])}||${r[12]}">${r[10]} - ${r[12]} DT</option>`; }); }
function addMnl() { let c = el('mo-c').value, i = el('mo-sel').value === 'CUSTOM' ? el('mo-i').value : decodeURIComponent(el('mo-sel').value.split('||')[0]), p = el('mo-p').value; if(!c || !i || !p) return toast(T[lang].fill, true); pAPI('admin_order', { client: c, plat: 'Manual', contact: 'Admin', items: [{ name: i, price: p, finalPrice: p }], promo: '', loy: 0, comments: 'Manual Order', c: 'Admin', payM: 'Cash', payLater: false, txId: 'N/A', proofB64: '' }); closeModal('mnl-ord-mod'); }
function openWhlEd() { let html = ''; db.whl.slice(1).forEach((w, i) => html += `<div>${w[1]} ${w[0]} (${w[3]}%)</div>`); el('whl-list').innerHTML = html; openModal('whl-ed-mod'); closeModal('adm-dash'); }
function createFolder() { let c = el('af-cat').value, s = el('af-sub').value, n = el('af-nom').value, e = el('af-emo').value; if(!c || !n) return toast(T[lang].fill, true); pAPI('add_item', { catE: c, subE: s, hasFld: true, fldN: n, fldE: e, nEn: "Dummy Item", p: 0, oos: false }); closeModal('add-fld-mod'); }
function addNewItem() { let c = el('ai-cat').value, s = el('ai-sub').value, f = el('ai-hasFld').checked, fn = el('ai-fldN').value, fe = el('ai-fldE').value, n = el('ai-nom').value, p = el('ai-prc').value; if(!c || !n || !p) return toast(T[lang].fill, true); pAPI('add_item', { catE: c, subE: s, hasFld: f, fldN: fn, fldE: fe, nEn: n, p: parseFloat(p), oos: false }); closeModal('inv-mng-mod'); }
function addPromo() { let c = el('np-code').value, p = el('np-pct').value; if(!c || !p) return toast(T[lang].fill, true); pAPI('add_promo', { code: c, pct: parseFloat(p) }); }
function renderMkt() { if(!el('p-list')) return; let pH = "", lH = ""; for(let k in db.promo) pH += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${k}</span><b>${db.promo[k]}%</b></div>`; for(let k in db.loy) lH += `<div class="glass" style="margin-bottom:0;">Ord: ${k}<br><b style="color:#00ff88;">${db.loy[k]}%</b></div>`; el('p-list').innerHTML = pH; el('l-list').innerHTML = lH; }

function drawCharts() {
    if(typeof Chart === 'undefined') return setTimeout(drawCharts, 500); if(!db.ord || db.ord.length === 0) return; let dC = { "Gaming": 0, "Streaming": 0, "Other": 0 }; let rD = {};
    db.ord.slice(1).forEach(o => { if(o.length > 3) { let ir = String(o[5]).toLowerCase(); if(ir.includes("netflix") || ir.includes("spotify")) dC["Streaming"]++; else if(ir.includes("valorant") || ir.includes("gta")) dC["Gaming"]++; else dC["Other"]++; if(o[10] === "Delivered") { let dt = new Date(o[11]).toLocaleDateString(undefined, { weekday: 'short', day: 'numeric' }); let p = parseFloat(String(o[9]).replace(/[^0-9.]/g, '')); if(!isNaN(p)) rD[dt] = (rD[dt] || 0) + p; } } });
    if(c1) c1.destroy(); if(el('admC')) { c1 = new Chart(el('admC'), { type: 'doughnut', data: { labels: Object.keys(dC), datasets: [{ data: Object.values(dC), backgroundColor: ['#00f0ff', '#ffae00', '#fff'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } } } } }); }
    if(c2) c2.destroy(); let rK = Object.keys(rD).slice(-7); let rV = rK.map(k => rD[k]); if(el('revC')) { c2 = new Chart(el('revC'), { type: 'bar', data: { labels: rK, datasets: [{ data: rV, backgroundColor: '#00ff88', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: '#fff' } }, y: { ticks: { color: '#fff' } } }, plugins: { legend: { display: false } } } }); }
}

function buildW() {
    if(!db.whl || db.whl.length < 2) return; 
    let cg = []; let leg = ""; let ang = 360 / (db.whl.length - 1);
    for(let i=1; i<db.whl.length; i++) { cg.push(`${db.whl[i][2]} ${(i-1)*ang}deg ${i*ang}deg`); leg += `<div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:12px;height:12px;background:${db.whl[i][2]};border-radius:50%;"></span>${db.whl[i][1]} ${db.whl[i][0]}</div>`; }
    if(el('wheel')) el('wheel').style.background = `conic-gradient(${cg.join(',')})`; 
    if(el('w-leg')) el('w-leg').innerHTML = leg;
}

async function spinW() {
    if(!checkRateLimit()) return;
    if(!user) { openModal('log-mod'); return toast(T[lang].rqLog, true); }
    if(Date.now() - (localStorage.getItem('ch_l_spn') || 0) < 172800000) { return toast(T[lang].err, true); }
    if(el('b-spin')) { el('b-spin').disabled = true; el('b-spin').innerText = "..."; }
    
    let rnd = Math.random() * 100; let acc = 0; let tIdx = 0; 
    for(let i=1; i<db.whl.length; i++) { acc += parseFloat(db.whl[i][3]); if(rnd <= acc) { tIdx = i - 1; break; } }
    let wRow = db.whl[tIdx+1]; let wP = wRow[0]; let reqContact = (wRow[5] === true || wRow[5] === "TRUE"); let custMsg = wRow[4] || `You won: ${wP}!`;

    try {
        let d = await customFetch(CFG.SURL, { method: 'POST', body: JSON.stringify({ act: 'log_spin', c: user || 'Guest', ip: userIP, did: dId, prize: wP, contactInfo: "Pending" }) });
        if(d && d.s !== 'ok') { if(el('b-spin')) { el('b-spin').disabled = false; el('b-spin').innerHTML = `<span class="tr" data-k="sn">${T[lang].sn}</span>`; } return toast(T[lang].err, true); }
        
        let s = db.whl.length - 1; let a = 360 / s; let tD = (360 * 5) + (360 - (tIdx * a) - (a / 2)); 
        if(el('wheel')) el('wheel').style.transform = `rotate(${tD}deg)`;
        localStorage.setItem('ch_l_spn', Date.now()); 
        
        setTimeout(async () => {
            let finalContact = "None";
            if(reqContact) { finalContact = prompt(`${custMsg}\n\n${T[lang].rContact}`) || "Refused"; } else { alert(custMsg); }
            if(reqContact && finalContact !== "None") { customFetch(CFG.SURL, { method: 'POST', body: JSON.stringify({ act: 'log_spin', c: user, ip: userIP, did: dId, prize: wP + " (Contact Update)", contactInfo: finalContact }) }); }
            if(el('b-spin')) { el('b-spin').innerHTML = `<span class="tr" data-k="sn">${T[lang].sn}</span>`; el('b-spin').disabled = false; }
        }, 4600);
    } catch(e) { if(el('b-spin')) { el('b-spin').disabled = false; el('b-spin').innerHTML = `<span class="tr" data-k="sn">${T[lang].sn}</span>`; } toast(T[lang].err, true); }
}

function reqTopUp() { let msg = `*Top-Up Request*\n\n*User:* ${user || 'Guest'}\n*Current Balance:* ${userWallet.toFixed(2)} DT\n*Requested Amount:* `; window.open(`https://wa.me/${CFG.WA}?text=${encodeURIComponent(msg)}`); }

if(document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initApp); } else { initApp(); }
</script>
