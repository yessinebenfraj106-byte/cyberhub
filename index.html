<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub | Digital Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>(function(){ emailjs.init("aVLHyVhILMDCu8T99"); })();</script> 
    <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400">
    
    <style>
        :root { --primary: #00f0ff; --bg: #02060d; --card: rgba(10, 20, 40, 0.25); --border: rgba(255, 255, 255, 0.1); --text: #ffffff; --sub: #94a3b8; --blend: screen; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; position: relative; z-index: 1; }
        
        /* 🔥 LIQUID GLASS */
        .liquid-glass { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(0, 240, 255, 0.05); transition: all 0.3s ease;
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--primary); padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        
        /* 📱 LEFT SIDEBAR MENU */
        #sidebar { position: fixed; top: 0; left: -300px; width: 260px; height: 100vh; background: rgba(2, 6, 13, 0.85); z-index: 5000; transition: 0.4s ease-in-out; padding: 30px 20px; border-right: 1px solid var(--primary); backdrop-filter: blur(25px); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        #sidebar.open { left: 0; }
        .close-menu { background: none; border: none; color: white; font-size: 2rem; position: absolute; top: 20px; right: 20px; cursor: pointer; }
        .menu-item { padding: 18px; font-size: 1.1rem; font-weight: bold; color: white; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .menu-item:hover { color: var(--primary); padding-left: 25px; background: rgba(0,240,255,0.1); border-radius: 12px; border-bottom: none; }

        .logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); margin: auto; display: block; background: #000; cursor: pointer; box-shadow: 0 0 30px rgba(0, 240, 255, 0.4); }
        
        /* 🔓 GOD MODE ADMIN PANEL */
        .admin-controls { padding: 20px; text-align: center; margin-bottom: 20px; border: 2px dashed #ffae00; display: none; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-maint { background: #ff4d4d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 0 15px rgba(255,77,77,0.4); }
        .btn-open { background: #00ff88; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; box-shadow: 0 0 15px rgba(0,255,136,0.4);}
        .btn-add { background: var(--primary); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 0 15px rgba(0,240,255,0.4);}

        /* ⏳ LIVE COUNTDOWN MAINTENANCE BANNER */
        .maintenance-band { background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #fff; padding: 25px; border-radius: 15px; text-align: center; margin-bottom: 20px; display: none; box-shadow: 0 0 30px rgba(255, 77, 77, 0.3); backdrop-filter: blur(10px); }
        #ui-maint-title { font-weight: 900; font-size: 1.2rem; letter-spacing: 2px; color: #ff4d4d; text-transform: uppercase; }
        #ui-maint-time { font-size: 2rem; font-weight: 800; margin-top: 15px; color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 0 15px #ff4d4d; }

        /* STANDALONE VS RETRACTABLE */
        .app-header { padding: 18px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 12px; font-weight: bold; font-size: 1.1rem; }
        .app-header img { width: 45px; height: 45px; object-fit: contain; }
        .app-header:hover { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        .retractable-content { display: none; padding-left: 15px; border-left: 2px solid var(--primary); margin-bottom: 20px; margin-left: 20px; animation: slideDown 0.3s ease-out; }
        
        .item-row { padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .add-btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .add-btn:hover { background: #fff; box-shadow: 0 0 15px var(--primary); transform: scale(1.02); }

        .fab-cart { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: #000; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 5px 20px rgba(0, 240, 255, 0.4); cursor: pointer; z-index: 1000; transition: 0.3s; border: none; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(2, 6, 23, 0.9); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(15px); padding: 20px; }
        .modal-content { padding: 30px; width: 100%; max-width: 480px; text-align: center; max-height: 85vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: var(--text); box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        input[type="datetime-local"] { color-scheme: dark; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2); }
        
        .checkbox-container { display: flex; align-items: center; gap: 15px; margin: 15px 0; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border: 1px solid var(--primary); text-align: left; }
        .checkbox-container input { width: 25px; height: 25px; margin: 0; cursor: pointer; accent-color: var(--primary); }

        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); border: 1px solid var(--primary); color: var(--text); padding: 15px 25px; border-radius: 30px; font-size: 1rem; z-index: 4000; font-weight: bold; transition: bottom 0.4s ease; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .toast.show { bottom: 30px; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .loader-text { text-align: center; color: var(--primary); font-weight: bold; margin-top: 40px; font-size: 1.1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="toast" class="toast liquid-glass"><span id="toast-icon">✨</span><span id="toast-msg">Message</span></div>

<div id="sidebar" class="liquid-glass">
    <button class="close-menu" onclick="toggleSidebar()">✖</button>
    <div style="text-align:center; margin-bottom: 30px;">
        <img src="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary);">
        <h3 style="color:var(--primary); margin-top:10px;">Menu</h3>
    </div>
    <div class="menu-item" onclick="openProfileOrLogin(); toggleSidebar();">👤 Account & Login</div>
    <div class="menu-item" onclick="window.location.href='mailto:cyber.hub.contact.now@gmail.com';">📞 Contact Us</div>
    <div class="menu-item" onclick="showToast('VIP Rewards Hub coming soon!', 'info'); toggleSidebar();" style="color:#ffae00;">💎 VIP Rewards Hub</div>
</div>

<div class="container">
    <div class="top-bar liquid-glass">
        <button class="icon-btn liquid-glass" onclick="toggleSidebar()">☰ MENU</button>
        <button class="icon-btn liquid-glass" onclick="document.getElementById('lang-screen').style.display='flex';" style="border:none; background:transparent;">🌐 Lang</button>
    </div>
    
    <div id="maintenance-msg" class="maintenance-band liquid-glass">
        <div id="ui-maint-title">STORE CLOSED</div>
        <div id="ui-maint-notice" style="font-size:0.9rem; margin-top:5px;">Until further notice.</div>
        <div id="ui-maint-time"></div>
    </div>
    
    <div class="header" style="text-align:center; margin-top: 10px;">
        <img src="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400" class="logo" onclick="logoTrigger()">
        <h2 style="color:var(--primary); margin-top:15px; letter-spacing: 3px; font-weight: 800; text-shadow: 0 0 10px rgba(0,240,255,0.5);">CYBERHUB</h2>
    </div>

    <div id="admin-panel" class="admin-controls liquid-glass">
        <b style="color:#ffae00; font-size:1.2rem;">🔓 GOD MODE ADMIN PORTAL</b><br>
        <p style="font-size:0.8rem; color:var(--sub); margin-bottom: 15px;">Live Control Panel</p>
        
        <label style="color:var(--primary); font-weight:bold; font-size:0.8rem; display:block; text-align:left;">Set Re-open Date/Time (Optional):</label>
        <input type="datetime-local" id="maint-timer-input" class="liquid-glass">
        <div class="admin-grid">
            <button class="btn-maint" onclick="setLiveMaintenance('TIMER')">⏳ Set Timer</button>
            <button class="btn-maint" onclick="setLiveMaintenance('UNTIL')" style="background:#b30000;">🛑 Close Until Notice</button>
        </div>
        <button class="btn-open" onclick="setLiveMaintenance('OFF')">🟢 OPEN STORE</button>
        <hr style="border: 1px solid var(--border); margin: 20px 0;">
        <button class="btn-add" onclick="openAddModal()">+ ADD NEW ITEM TO STORE</button>
    </div>

    <div id="shop-wrapper">
        <input type="text" id="mainSearch" class="liquid-glass" placeholder="Search Store..." oninput="applyFilters()" style="margin-bottom:20px;">
        <div id="content-area"><div class="loader-text">Live Syncing Data... ⏳</div></div>
    </div>
</div>

<button class="fab-cart" onclick="openCart()">🛒<div class="badge" id="cart-count">0</div></button>

<div id="add-item-modal" class="modal">
    <div class="modal-content liquid-glass">
        <h3 style="color:var(--primary); padding-bottom:10px;">➕ Add Item</h3>
        
        <select id="add-cat-sel"><option value="Gaming">Gaming</option><option value="Streaming">Streaming</option></select>
        <input type="text" id="add-app" placeholder="App/Brand (e.g., Netflix)">
        <input type="text" id="add-item-name" placeholder="Item Details (e.g., 1 Profile - 1 Month)">
        <input type="number" id="add-item-price" placeholder="Price (DT)">
        
        <div class="checkbox-container">
            <input type="checkbox" id="add-is-retractable" onchange="toggleRetractableInput()">
            <div>
                <b style="color:white;">Make this Retractable?</b><br>
                <span style="font-size:0.75rem; color:var(--sub);">Groups it into a dropdown menu.</span>
            </div>
        </div>
        <input type="text" id="add-retract-group" placeholder="Menu Name (e.g., Netflix Profiles)" style="display:none; border-color:var(--primary);">

        <button class="add-btn" onclick="submitNewItem()">💾 Save to Live Store</button>
        <button onclick="closeModal('add-item-modal')" style="background:none; border:none; color:var(--sub); margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="lang-screen"></div><div id="auth-choice-modal" class="modal"></div><div id="pass-input-modal" class="modal"></div><div id="profile-modal" class="modal"></div><div id="modal" class="modal"></div><div id="login-modal" class="modal"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYYcuVyFNNCNdQ8P2aBk_kaGzX4X8UM1uRcKBkgLwkeCr7df_bcvSKsfM5XHfOattp/exec"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1XtTR1Jf6-hCt3bGSQ45aP5un8TJpyHVTyVdyM8qFBOA/export?format=csv";
    
    let toastTimeout; function showToast(msg, type = "info") { const toast = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; toast.className = 'toast liquid-glass show'; if(type === "error") { toast.classList.add('error'); document.getElementById('toast-icon').innerText = '❌'; } else if(type === "success") { toast.classList.add('success'); document.getElementById('toast-icon').innerText = '✅'; } else { document.getElementById('toast-icon').innerText = '⏳'; } clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3500); }

    function toggleSidebar() { const sb = document.getElementById('sidebar'); sb.classList.toggle('open'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openAddModal() { document.getElementById('add-item-modal').style.display = 'flex'; }
    function toggleRetractableInput() { document.getElementById('add-retract-group').style.display = document.getElementById('add-is-retractable').checked ? 'block' : 'none'; }

    let productsData = { categories: [], standalone: [] }; let cart = []; let isAdmin = false; let globalMaintenance = false; let lastDataString = ""; let clickCount = 0; let countdownInterval;

    // 🔥 TRUE LIVE SYNC ENGINE (Runs every 3 seconds without refreshing the page)
    setInterval(fetchData, 3000); 

    async function fetchData() {
        try {
            const res = await fetch(SHEET_URL + "&t=" + new Date().getTime()); const text = await res.text();
            if(text === lastDataString && !isAdmin) return; lastDataString = text; // Only rebuild if data changed
            
            const rows = text.split('\n'); const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            // 🔓 GOD MODE MAINTENANCE CHECK
            let maintData = headers.length > 15 ? headers[15].replace(/^"|"$/g, '').trim() : "OFF";
            handleMaintenanceUI(maintData);

            let temp = {}; let tempStandalone = [];
            rows.slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 6 && cols[0] !== "") {
                    const cat = cols[0]; const app = cols[2]; const itemNameRaw = cols[4]; const price = parseFloat(cols[5]) || 0; const isOOS = cols.some(c => c && c.toUpperCase() === "OOS");
                    
                    // Decode the Retractable Group Logic (Using a hidden tag in the name)
                    let itemName = itemNameRaw; let groupName = null;
                    if(itemNameRaw.includes("||GRP||")) {
                        let parts = itemNameRaw.split("||GRP||"); itemName = parts[0]; groupName = parts[1];
                    }

                    if(groupName) { // Put in Retractable Menu
                        if (!temp[cat]) temp[cat] = { name: cat, groups: {} };
                        if (!temp[cat].groups[groupName]) temp[cat].groups[groupName] = { name: groupName, img: cols[3], items: [] };
                        temp[cat].groups[groupName].items.push({ name: itemName, originalName: itemNameRaw, price: price, isOOS: isOOS, app: app });
                    } else { // Standalone Giant Card
                        tempStandalone.push({ cat: cat, app: app, img: cols[3], name: itemName, originalName: itemNameRaw, price: price, isOOS: isOOS });
                    }
                }
            });
            productsData.categories = Object.values(temp).map(c => { c.groups = Object.values(c.groups); return c; });
            productsData.standalone = tempStandalone;
            
            applyFilters(); // Live Draw
        } catch (e) {}
    }

    // ⏳ LIVE TIMER ENGINE
    function handleMaintenanceUI(maintData) {
        clearInterval(countdownInterval);
        const band = document.getElementById('maintenance-msg'); const timeEl = document.getElementById('ui-maint-time'); const noticeEl = document.getElementById('ui-maint-notice');
        
        if(maintData === "OFF") {
            band.style.display = 'none'; document.getElementById('shop-wrapper').style.display = 'block'; globalMaintenance = false;
        } else {
            band.style.display = 'block'; document.getElementById('shop-wrapper').style.display = isAdmin ? 'block' : 'none'; globalMaintenance = true;
            if(maintData === "UNTIL") {
                timeEl.style.display = 'none'; noticeEl.style.display = 'block'; noticeEl.innerText = "Closed until further notice.";
            } else { // It is a Timestamp
                let target = parseInt(maintData); timeEl.style.display = 'block'; noticeEl.style.display = 'block'; noticeEl.innerText = "Reopening in:";
                countdownInterval = setInterval(() => {
                    let now = new Date().getTime(); let distance = target - now;
                    if(distance < 0) { clearInterval(countdownInterval); timeEl.innerText = "Opening shortly..."; }
                    else {
                        let d = Math.floor(distance / (1000 * 60 * 60 * 24)); let h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)); let m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)); let s = Math.floor((distance % (1000 * 60)) / 1000);
                        timeEl.innerText = `${d}d ${h}h ${m}m ${s}s`;
                    }
                }, 1000);
            }
        }
    }

    async function setLiveMaintenance(mode) {
        let payload = { action: "maintenance", state: true, value: "UNTIL" };
        if(mode === "OFF") { payload.state = false; payload.value = "OFF"; }
        if(mode === "TIMER") {
            let timeVal = document.getElementById('maint-timer-input').value;
            if(!timeVal) return showToast("Please select a date and time first!", "error");
            payload.value = new Date(timeVal).getTime().toString();
        }
        showToast("Pushing live update...", "info");
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload), mode: 'no-cors' });
        setTimeout(() => { lastDataString = ""; fetchData(); showToast("Store Status Live Updated!", "success"); }, 1500);
    }

    function submitNewItem() {
        let cat = document.getElementById('add-cat-sel').value; let app = document.getElementById('add-app').value; let name = document.getElementById('add-item-name').value; let price = document.getElementById('add-item-price').value;
        if(!cat || !app || !name || !price) return showToast("Fill all fields", "error");
        
        // Magically append the group name so it organizes perfectly in the sheet without changing formulas
        if(document.getElementById('add-is-retractable').checked) {
            let group = document.getElementById('add-retract-group').value;
            if(!group) return showToast("Provide a Menu Name", "error");
            name = name + "||GRP||" + group;
        }
        
        showToast("Uploading to live store...", "info"); closeModal('add-item-modal');
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "add", cat: cat, app: app, name: name, price: price }), mode: 'no-cors' })
        .then(() => { setTimeout(() => { lastDataString = ""; fetchData(); showToast("Live Sync Complete!", "success"); }, 1500); });
    }

    function applyFilters() {
        const q = document.getElementById('mainSearch').value.toLowerCase(); let html = '';
        
        // 1. Draw Standalone Items First
        productsData.standalone.forEach((it, i) => {
            if(!q || it.name.toLowerCase().includes(q) || it.app.toLowerCase().includes(q)) {
                html += `
                <div class="item-row liquid-glass" style="padding:20px; text-align:center;">
                    <img src="${it.img}" style="width:60px; height:60px; margin:0 auto 10px auto;">
                    <span style="font-size:1.1rem; font-weight:900;">${it.name}</span>
                    <b style="color:var(--primary); font-size:1.3rem; margin-top:5px;">${it.price} DT</b>
                    <button class="add-btn" onclick="addToCart('${it.originalName}', ${it.price})">ADD TO CART</button>
                </div>`;
            }
        });

        // 2. Draw Retractable Menus
        productsData.categories.forEach((c, cI) => {
            c.groups.forEach((g, gI) => {
                let validItems = g.items.filter(it => !q || it.name.toLowerCase().includes(q) || g.name.toLowerCase().includes(q));
                if(validItems.length > 0) {
                    html += `
                    <div class="liquid-glass app-header" onclick="document.getElementById('acc-${cI}-${gI}').style.display = document.getElementById('acc-${cI}-${gI}').style.display === 'none' ? 'block' : 'none'">
                        <img src="${g.img}"> <span>${g.name} (${validItems.length})</span> <span style="margin-left:auto;">▼</span>
                    </div>
                    <div id="acc-${cI}-${gI}" class="retractable-content" style="${q ? 'display:block;' : 'display:none;'}">
                    `;
                    validItems.forEach(it => {
                        html += `
                        <div class="item-row">
                            <span style="font-weight:bold;">${it.name}</span>
                            <b style="color:var(--primary);">${it.price} DT</b>
                            <button class="add-btn" style="padding:8px;" onclick="addToCart('${it.originalName}', ${it.price})">ADD</button>
                        </div>`;
                    });
                    html += `</div>`;
                }
            });
        });

        document.getElementById('content-area').innerHTML = html || `<p style="text-align:center; color:var(--sub);">No items found.</p>`;
    }

    function addToCart(nameRaw, price) { 
        let cleanName = nameRaw.includes("||GRP||") ? nameRaw.split("||GRP||")[0] : nameRaw;
        cart.push({name: cleanName, price: price}); document.getElementById('cart-count').innerText = cart.length; showToast("Added!", "success"); 
    }
    function logoTrigger() { clickCount++; if(clickCount === 5) { clickCount = 0; isAdmin = true; document.getElementById('admin-panel').style.display = 'block'; showToast("🔓 God Mode Unlocked!", "success"); } }
    fetchData(); 
</script>
</body>
</html>
