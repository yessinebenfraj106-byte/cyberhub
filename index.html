<script>
// --- FULL BILINGUAL DICTIONARY (EN & FR) ---
const T = {
    en: { ld: "Loading Store... ⏳", srch: "Search Item Name or ID...", add: "ADD TO CART", oos: "OUT OF STOCK", bck: "← Back", acc: "Account & Profile", pol: "Store Policy", mord: "My Orders", spin: "Spin & Win", god: "God-Mode", hlp: "Need Help?", si: "Sign In", ca: "Create Account", fp: "Forgot Password?", em: "Email", ph: "Phone", userP: "Email or Phone", pw: "Password", cp: "Create Password", log: "Log In", sndReg: "Register", vc: "Enter Code", ver: "Verify & Login", canc: "Cancel", pro: "My Profile", lo: "Log Out", crt: "Cart", sub: "Subtotal: ", tot: "Total: ", chk: "Checkout", clr: "Clear", cls: "Close", sco: "Secure Checkout", fn: "Full Name", cm: "Contact Method", nts: "Comments or IDs", plc: "PLACE ORDER", emp: "Cart Empty", fill: "Fill fields", bnc: "Banned", ic: "Invalid Creds", err: "Error", scs: "Success", rq: "Required", mn: "Manual Order", rqLog: "Please Login!", reqSrv: "Request Custom Service", sndWa: "Send via WhatsApp", admErr: "Invalid Admin Password", vip: "VIP Rewards", vipDesc: "Earn automatic lifetime discounts by ordering more!", yOrd: "Your Orders:", cDisc: "Current Discount:", noFunds: "Insufficient Wallet Balance!", welcBack: "Welcome back!", flStr: "Flash Sale Started!", thm: "Theme: ", logStr: "Login Streak:", days: "Days", d17Inst: "D17 Transfer to:", mmInst: "Mandat Minute Transfer:", ordPlc: "ORDER PLACED", invCop: "Invoice copied to clipboard!", accDen: "ACCESS DENIED", track: "Track Order", walPay: "Wallet", opnDm: "OPEN DM & PASTE", shr: "Share", tTip: "Buy the Admin a Coffee (+1 DT)" },
    fr: { ld: "Chargement... ⏳", srch: "Rechercher un article ou ID...", add: "AJOUTER", oos: "RUPTURE DE STOCK", bck: "← Retour", acc: "Compte & Profil", pol: "Politique Boutique", mord: "Mes Commandes", spin: "Tourner & Gagner", god: "Mode Admin", hlp: "Besoin d'Aide ?", si: "Se Connecter", ca: "Créer un Compte", fp: "Mot de passe oublié ?", em: "Email", ph: "Téléphone", userP: "Email ou Téléphone", pw: "Mot de passe", cp: "Créer un Mot de passe", log: "Connexion", sndReg: "S'inscrire", vc: "Entrer le Code", ver: "Vérifier & Se Connecter", canc: "Annuler", pro: "Mon Profil", lo: "Déconnexion", crt: "Panier", sub: "Sous-total : ", tot: "Total : ", chk: "Commander", clr: "Vider", cls: "Fermer", sco: "Paiement Sécurisé", fn: "Nom Complet", cm: "Méthode de contact", nts: "Commentaires ou IDs de jeu", plc: "VALIDER LA COMMANDE", emp: "Panier Vide", fill: "Veuillez remplir les champs", bnc: "Compte Banni", ic: "Identifiants Invalides", err: "Erreur Système", scs: "Succès !", rq: "Requis", mn: "Cmd Manuelle", rqLog: "Connectez-vous !", reqSrv: "Demander un Service", sndWa: "Envoyer via WhatsApp", admErr: "Mot de passe Admin invalide", vip: "Récompenses VIP", vipDesc: "Gagnez des réductions à vie !", yOrd: "Vos Commandes :", cDisc: "Réduction Actuelle :", noFunds: "Solde insuffisant !", welcBack: "Bon retour !", flStr: "Vente Flash lancée !", thm: "Thème : ", logStr: "Série de connexions :", days: "Jours", d17Inst: "Transfert D17 au :", mmInst: "Transfert Mandat Minute au :", ordPlc: "COMMANDE VALIDÉE", invCop: "Facture copiée !", accDen: "ACCÈS REFUSÉ", track: "Suivre Cmd", walPay: "Wallet", opnDm: "OUVRIR DM & COLLER", shr: "Partager", tTip: "Offrir un café à l'Admin (+1 DT)" }
};

// --- GLOBAL VARIABLES ---
let db = { inv: [], rewards: [], wheel: [], ord: [], bans: [] }; 
let cart = []; 
let cView = { t: 'cats', c: null, a: null }; 
let catSubMapGlobal = {};
let lang = localStorage.getItem('ch_lng') || 'en';
let user = localStorage.getItem('ch_user'); 
let role = localStorage.getItem('ch_role');
let uOrders = parseInt(localStorage.getItem('ch_ord') || 0); 
let userWallet = parseFloat(localStorage.getItem('ch_wal') || 0);

let payM = "D17"; 
let proofB64 = ""; 
let userIP = "Unknown";
let activeDiscount = { type: "None", pct: 0, str: "" };
let wSpinning = false; 
let loginStreak = parseInt(localStorage.getItem('ch_streak') || 0);

// --- APP INSTALLATION (PWA) ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => { 
    e.preventDefault(); 
    deferredPrompt = e; 
    document.getElementById('install-banner').style.display = 'block'; 
});

function handleInstallClick() {
    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    if (isIos()) { 
        openModal('ios-install-mod'); 
    } else if (deferredPrompt) { 
        deferredPrompt.prompt(); 
        deferredPrompt.userChoice.then((choice) => { 
            if(choice.outcome === 'accepted') {
                document.getElementById('install-banner').style.display = 'none'; 
            }
            deferredPrompt = null; 
        }); 
    }
}

// --- UTILITY FUNCTIONS ---
const el = id => document.getElementById(id);
const sEnc = s => encodeURIComponent(s).replace(/'/g,"%27");
function hexToRgba(hex, alpha) { 
    let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); 
    return `rgba(${r}, ${g}, ${b}, ${alpha})`; 
}

async function fetchSafeIP() { 
    try { 
        let r = await fetch('https://api.ipify.org?format=json'); 
        let d = await r.json(); 
        return d.ip; 
    } catch(e) { return "Guest"; } 
}

async function customFetch(url, options = {}) { 
    try { 
        let res = await fetch(url, options); 
        let text = await res.text(); 
        try { return JSON.parse(text); } catch(err) { return null; } 
    } catch(e) { return null; } 
}

// --- UI HELPERS ---
function chkUI() { 
    let lp = getHighestLoyaltyPct();
    if(el('vip-ord-cnt')) el('vip-ord-cnt').innerText = uOrders; 
    if(el('vip-disc-pct')) el('vip-disc-pct').innerText = lp + "%"; 
    if(el('ui-d17-in')) el('ui-d17-in').innerText = window.CFG.D17;
    if(el('qr-d17')) el('qr-d17').src = window.CFG.D17_QR;
}

function toast(m, type = 'success') { 
    let t = el('toast'); 
    let i = type === 'error' ? '🚨' : (type === 'info' ? '⚡' : '✅'); 
    let c = type === 'error' ? '#ff4d4d' : (type === 'info' ? '#00f0ff' : '#00ff88'); 
    el('t-msg').innerHTML = `${i} <span style="color:${c}">${m}</span>`; 
    t.classList.add('show'); 
    setTimeout(() => t.classList.remove('show'), 3000); 
}

function openModal(i) { 
    let m = el(i); 
    m.style.display = 'flex'; 
    document.body.classList.add('modal-open'); 
    setTimeout(() => m.classList.add('show'), 10); 
}

function closeModal(i) { 
    let m = el(i); 
    m.classList.remove('show'); 
    document.body.classList.remove('modal-open'); 
    setTimeout(() => m.style.display = 'none', 300); 
}

function toggleSidebar() { 
    el('sidebar').classList.toggle('open'); 
}

function swA(i) { 
    ['l-step', 'r-step', 'otp-req', 'otp-ver'].forEach(x => { 
        if(el(x)) el(x).style.display = 'none'; 
    }); 
    if(el(i)) el(i).style.display = 'block'; 
}

function maskEm(str) { 
    if(!str) return ""; 
    if(str.includes('@')) { 
        let p = str.split('@'); 
        return p[0].slice(0,2) + "***@" + p[1]; 
    } 
    return str.slice(0,3) + "***" + str.slice(-2); 
}

function openProf() { 
    if(!user) { 
        swA('l-step'); 
        return openModal('log-mod'); 
    } 
    el('p-uid').innerText = maskEm(user); 
    if(el('p-wal-bal')) el('p-wal-bal').innerText = userWallet.toFixed(2); 
    chkUI(); 
    openModal('prof-mod'); 
}

function logOut() { 
    localStorage.removeItem('ch_user'); 
    localStorage.removeItem('ch_role'); 
    user = null; 
    role = null; 
    closeModal('prof-mod'); 
    chkUI(); 
    ren(); 
}

function fUsrOrd() { 
    if(!user) { 
        swA('l-step'); 
        openModal('log-mod'); 
        return toast(T[lang].rqLog, true); 
    } 
    customFetch(window.CFG.SURL + "?action=get_public_data").then(d => { 
        if(d) { 
            let uo = d.ord.filter(o => o[12] === user); 
            let h = `<h3 style="color:var(--w);">📦 ${T[lang].mord}</h3>`; 
            if(uo.length === 0) h += `<div style="text-align:center;color:gray;">Empty.</div>`; 
            uo.forEach(o => { 
                h += `<div class="glass"><b>${o[5]}</b><br><span style="color:var(--p);font-weight:bold;">${o[8]} DT</span> - ${o[9]}</div>` 
            }); 
            el('d-box').innerHTML = h; 
            openModal('d-mod'); 
        } 
    }); 
}

// --- VOICE SEARCH ---
function stVoiceSearch() {
    if (!('webkitSpeechRecognition' in window)) {
        return toast("Voice search not supported on this browser.", true);
    }
    let rec = new webkitSpeechRecognition(); 
    rec.lang = lang === 'fr' ? 'fr-FR' : 'en-US';
    rec.start(); 
    toast("Listening... 🎤", "info");
    rec.onresult = function(e) { 
        el('itemFinder').value = e.results[0][0].transcript; 
        ren(); 
    };
    rec.onerror = function(e) { toast("Voice error.", true); }
}

// --- TRANSLATION ENGINE ---
function tgLang() { 
    lang = lang === 'en' ? 'fr' : 'en'; 
    localStorage.setItem('ch_lng', lang); 
    appLang(); 
    ren(); 
}

function appLang() { 
    let ind = lang === 'en' ? '🇬🇧 EN' : '🇫🇷 FR'; 
    if(el('l-ind')) el('l-ind').innerHTML = ind; 
    
    document.querySelectorAll('.tr').forEach(e => { 
        let k = e.getAttribute('data-k'); 
        if(T[lang] && T[lang][k]) e.innerHTML = T[lang][k]; 
    }); 
    
    document.querySelectorAll('.tr-ph').forEach(e => { 
        let k = e.getAttribute('data-k'); 
        if(T[lang] && T[lang][k]) e.placeholder = T[lang][k]; 
    }); 
}

// --- SYSTEM INITIALIZATION ---
function hMaint(m) {
    if(!m) return;
    let b = el('maint-banner'), t = el('ui-m-m'), tit = el('ui-m-t');
    
    if(m.bands) { 
        el('stripe-top').style.display = 'block'; 
        el('stripe-bot').style.display = 'block'; 
    } else { 
        el('stripe-top').style.display = 'none'; 
        el('stripe-bot').style.display = 'none'; 
    }
    
    if(m.closed) { 
        if(b) b.style.display = 'block'; 
        if(tit) tit.innerHTML = "STORE CLOSED"; 
        if(t) t.innerHTML = m.msg; 
        el('st-cnt').style.display = 'none'; 
    } 
    else if(m.bMsg) { 
        if(b) b.style.display = 'block'; 
        if(tit) tit.innerHTML = "ANNOUNCEMENT"; 
        if(t) t.innerHTML = m.bMsg; 
        el('st-cnt').style.display = 'block'; 
    } 
    else { 
        if(b) b.style.display = 'none'; 
        el('st-cnt').style.display = 'block'; 
    }
    
    if(m.css) {
        let style = document.createElement('style');
        style.innerHTML = m.css;
        document.head.appendChild(style);
    }
}

function initApp() {
    el('ui-store-name').innerText = window.CFG.NAME; 
    el('main-logo').src = window.CFG.LOGO; 
    el('sb-logo').src = window.CFG.LOGO; 
    appLang(); 
    
    // Check for Shared Cart
    const urlParams = new URLSearchParams(window.location.search);
    const sharedCart = urlParams.get('cart');
    if (sharedCart) {
        try {
            cart = JSON.parse(decodeURIComponent(atob(sharedCart)));
            localStorage.setItem('ch_cart', JSON.stringify(cart));
            window.history.replaceState({}, document.title, window.location.pathname);
            el('c-count').innerText = cart.length;
            setTimeout(() => openModal('cart-mod'), 1000);
            toast("Shared Cart Loaded!", "info");
        } catch(e) { 
            console.error("Invalid shared cart"); 
        }
    } else {
        try { 
            let sc = localStorage.getItem('ch_cart'); 
            if(sc && sc !== "[]") { 
                cart = JSON.parse(sc); 
                el('c-count').innerText = cart.length; 
            } 
        } catch(e) {}
    }

    customFetch(window.CFG.SURL + "?action=get_public_data").then(d => {
        if(d && d.status === "success") { 
            db = d; 
            hMaint(d.maintObj); 
            chkUI(); 
            ren(); 
        }
    });
    
    fetchSafeIP().then(ip => userIP = ip);
}

// --- DISCOUNT & REWARD CALCULATORS ---
function getHighestLoyaltyPct() { 
    let pct = 0; 
    if(db.rewards) { 
        db.rewards.forEach(r => { 
            if(r.type === "Loyalty" && uOrders >= parseInt(r.rule) && r.pct > pct) pct = r.pct; 
        }); 
    } 
    return pct; 
}

function getStreakPct() { 
    let pct = 0; 
    if(db.rewards) { 
        db.rewards.forEach(r => { 
            if(r.type === "Streak" && loginStreak >= parseInt(r.rule) && r.pct > pct) pct = r.pct; 
        }); 
    } 
    return pct; 
}

// --- RENDER ENGINE (STORE GRID) ---
function ren() {
    let hHtml = ""; 
    let a = el('st-cnt'); 
    if(!a) return; 
    
    let q = el('itemFinder').value.trim(); 
    let c = {}, ap = {}, g = {}, sA = [];
    
    if (q.toUpperCase() === "TERMINAL") { 
        el('itemFinder').value = ""; 
        document.body.classList.add('terminal-mode'); 
        toast("SYSTEM OVERRIDE", "info"); 
        return; 
    }
    
    if(!db.inv || db.inv.length < 2) { 
        a.innerHTML = `<div style="text-align:center;padding:40px;color:var(--w);font-weight:bold;">Store is empty right now!</div>`; 
        return; 
    }
    
    let pMaint = db.maintObj && db.maintObj.partial ? db.maintObj.partial.toLowerCase() : "";
    let isFr = lang === 'fr'; 
    
    // First Pass: Build Categories
    db.inv.slice(1).forEach(r => { 
        if(!r || (!r[13] && !r[14])) return; 
        let cat = isFr ? (r[1] || r[2]) : (r[2] || r[1]); 
        if(pMaint && pMaint.includes(cat.toLowerCase())) return; 
        let sub = isFr ? (r[5] || r[6]) : (r[6] || r[5]); 
        
        if(cat && !c[cat]) c[cat] = { hHex: r[3] || 'var(--p)', i: r[4] };
        if(sub && !ap[sub]) ap[sub] = { cat: cat, col: r[7] || c[cat].hHex, i: r[8] };
    });

    // Second Pass: Build Items
    db.inv.slice(1).forEach(r => {
        if(!r || (!r[13] && !r[14])) return;
        let cat = isFr ? (r[1] || r[2]) : (r[2] || r[1]); 
        if(pMaint && pMaint.includes(cat.toLowerCase())) return;
        
        let itmId = r[0] ? String(r[0]).trim() : "IT-000"; 
        let sub = isFr ? (r[5] || r[6]) : (r[6] || r[5]); 
        let hasFld = (r[9] === true || String(r[9]).toLowerCase() === 'true'); 
        let fldN = isFr ? (r[10] || r[11]) : (r[11] || r[10]); 
        let fldE = r[12] || "📁"; 
        let n = isFr ? (r[13] || r[14]) : (r[14] || r[13]); 
        let p = parseFloat(r[15]) || 0; 
        let oos = (r.length > 18 && String(r[18]).toUpperCase().includes("OOS")); 
        let exReq = (r[19] === true || String(r[19]).toLowerCase() === 'true'); 
        let exNum = parseInt(r[20]) || 1;
        let exTxt = isFr ? (r[21] || "Details...") : (r[22] || r[21] || "Details..."); 
        let wrn = isFr ? (r[23] || r[24]) : (r[24] || r[23]); 
        let artImg = r[25] || '';
        let subHex = sub && ap[sub] ? ap[sub].col : (c[cat] ? c[cat].hHex : 'var(--p)');
        
        // Search Mode
        if(q) { 
            let lQ = q.toLowerCase(); 
            if(n.toLowerCase().includes(lQ) || itmId.toLowerCase().includes(lQ)) { 
                sA.push({ id: itmId, n: n, p: p, oos: oos, exReq: exReq, exTxt: exTxt, exNum: exNum, wrn: wrn, col: subHex, cat: cat, sub: sub, img: artImg }); 
            } 
            return; 
        }
        
        // Category / Folder Mode
        if(cView.t === 'cats') {} 
        else if(cView.t === 'apps' && cView.c === cat) { 
            if(!sub) { 
                let itemData = { id: itmId, n: n, p: p, oos: oos, exReq: exReq, exTxt: exTxt, exNum: exNum, wrn: wrn, col: subHex, cat: cat, sub: '', img: artImg }; 
                if(hasFld) { 
                    if(!g[fldN]) g[fldN] = { emoji: fldE, items: [] }; 
                    g[fldN].items.push(itemData); 
                } else { sA.push(itemData); } 
            } 
        } 
        else if(cView.t === 'items' && cView.c === cat && cView.a === sub) { 
            let itemData = { id: itmId, n: n, p: p, oos: oos, exReq: exReq, exTxt: exTxt, exNum: exNum, wrn: wrn, col: subHex, cat: cat, sub: sub, img: artImg }; 
            if(hasFld) { 
                if(!g[fldN]) g[fldN] = { emoji: fldE, items: [] }; 
                g[fldN].items.push(itemData); 
            } else { sA.push(itemData); } 
        }
    });

    // View Rendering
    if(q) { 
        if(sA.length === 0) hHtml = `<div style="text-align:center;color:gray;">Empty.</div>`; 
        else { hHtml += `<div id="store-sort-list">`; sA.forEach(i => hHtml += dR(i, q)); hHtml += `</div>`; } 
    } 
    else if(cView.t === 'cats') { 
        hHtml += `<div class="grid">`; 
        for(let k in c) { 
            let transpBg = c[k].hHex.length === 7 ? hexToRgba(c[k].hHex, 0.15) : c[k].hHex; 
            hHtml += `<div class="n-card" style="border-color:${c[k].hHex};background:linear-gradient(135deg,${transpBg},var(--c));box-shadow:0 4px 15px ${transpBg};" onclick="navTo('apps','${sEnc(k)}'); playSnd();">${c[k].i ? `<img src="${c[k].i}" class="img-transparent">` : ''}<b>${k}</b></div>`; 
        } 
        hHtml += `</div>`; 
    } 
    else if(cView.t === 'apps') { 
        hHtml += `<button class="icon-btn" onclick="navTo('cats'); playSnd();" style="margin-bottom:15px;background:transparent;border-color:var(--p);color:var(--p);">← Back</button><div class="grid">`; 
        for(let k in ap) { 
            if(ap[k].cat === cView.c && k) { 
                let transpBg = ap[k].col.length === 7 ? hexToRgba(ap[k].col, 0.15) : ap[k].col; 
                hHtml += `<div class="n-card" style="border-color:${ap[k].col};background:linear-gradient(135deg,${transpBg},var(--c));box-shadow:0 4px 15px ${transpBg};" onclick="navTo('items','${sEnc(cView.c)}','${sEnc(k)}'); playSnd();">${ap[k].i ? `<img src="${ap[k].i}" class="img-transparent">` : ''}<b>${k}</b></div>`; 
            } 
        } 
        hHtml += `</div>`;
        if(sA.length > 0 || Object.keys(g).length > 0) { 
            hHtml += `<div id="store-sort-list" style="margin-top:15px;">`; 
            for(let fName in g) { 
                let rId = "g-" + fName.replace(/[\s']/g, ''); 
                let catCol = c[cView.c].hHex; 
                let transpBg = catCol.length === 7 ? hexToRgba(catCol, 0.15) : catCol; 
                hHtml += `<div class="f-head" style="border-left-color:${catCol};background:linear-gradient(135deg,${transpBg},rgba(0,0,0,0.5));" onclick="let e=el('${rId}');e.style.display=e.style.display==='block'?'none':'block';"><span>${g[fName].emoji} ${fName} (${g[fName].items.length})</span><span style="color:${catCol};font-size:0.8rem;">▼</span></div><div id="${rId}" style="display:none;padding-left:15px;border-left:2px dashed ${catCol};margin-left:10px;margin-bottom:20px;">`; 
                g[fName].items.forEach(i => hHtml += dR(i)); hHtml += `</div>`; 
            } 
            sA.forEach(i => hHtml += dR(i)); 
            hHtml += `</div>`; 
        }
    } 
    else if(cView.t === 'items') { 
        hHtml += `<button class="icon-btn" onclick="navTo('apps','${sEnc(cView.c)}'); playSnd();" style="margin-bottom:15px;background:transparent;border-color:var(--p);color:var(--p);">← Back</button><div id="store-sort-list">`; 
        for(let fName in g) { 
            let rId = "g-" + fName.replace(/[\s']/g, ''); 
            let catCol = ap[cView.a] ? ap[cView.a].col : 'var(--p)'; 
            let transpBg = hexToRgba(catCol, 0.15); 
            hHtml += `<div class="f-head" style="border-left-color:${catCol};background:linear-gradient(135deg,${transpBg},rgba(0,0,0,0.5));" onclick="let e=el('${rId}');e.style.display=e.style.display==='block'?'none':'block';"><span>${g[fName].emoji} ${fName} (${g[fName].items.length})</span><span style="color:${catCol};font-size:0.8rem;">▼</span></div><div id="${rId}" style="display:none;padding-left:15px;border-left:2px dashed ${catCol};margin-left:10px;margin-bottom:20px;">`; 
            g[fName].items.forEach(i => hHtml += dR(i)); hHtml += `</div>`; 
        } 
        sA.forEach(i => hHtml += dR(i)); 
        hHtml += `</div>`; 
    }
    
    a.innerHTML = hHtml; 
    appLang();
}

function navTo(t, c, a) { 
    cView.t = t; 
    cView.c = c ? decodeURIComponent(c) : null; 
    cView.a = a ? decodeURIComponent(a) : null; 
    el('itemFinder').value = ""; 
    ren(); 
}

function highlightMatch(text, query) { 
    if(!query) return text; 
    let regex = new RegExp(`(${query})`, "gi"); 
    return text.replace(regex, "<span class='hl-search'>$1</span>"); 
}

function dR(i, q = "") {
    let eO = sEnc(i.id); 
    let eN = sEnc(`${i.cat} > ${i.sub ? i.sub + ' > ' : ''}${i.n}`);
    let wrnHtml = i.wrn ? `<div style="color:var(--w);font-size:0.75rem;margin-top:5px;font-weight:bold;">⚠️ ${i.wrn}</div>` : '';
    
    let extHtml = ''; 
    let exCount = i.exNum || 1;
    if(i.exReq) {
        let placeholders = i.exTxt.split(','); 
        for(let j=0; j<exCount; j++) { 
            let pl = placeholders[j] ? placeholders[j].trim() : "Details..."; 
            extHtml += `<input type="text" id="ex-${i.id}-${j}" placeholder="${pl}" autocomplete="off" style="margin-bottom:5px;padding:8px;font-size:0.85rem;width:100%;">`; 
        }
    }
    
    let btnCol = i.col || 'var(--p)';
    let catHtml = (i.cat && i.sub) ? `<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">${i.cat} <span style="color:${btnCol};opacity:0.8;">▶</span> ${i.sub}</div>` : `<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">${i.cat}</div>`;
    let imgHtml = i.img ? `<img src="${i.img}" class="img-transparent" style="width:50px; height:50px; margin-right:15px;">` : '';
    let b = i.oos ? `<button class="btn" style="background:#333;color:#777;margin:0;" disabled><span class="tr" data-k="oos">OUT OF STOCK</span></button>` : `<button class="btn" style="margin:0;background:${btnCol};color:#000;" onclick="addC('${eO}',${i.p},'${eN}',${i.exReq}, ${exCount}); if(navigator.vibrate) navigator.vibrate(50);"><span class="tr" data-k="add">ADD</span></button>`;
    let nDisp = q ? highlightMatch(i.n, q) : i.n;
    
    return `<div class="i-row" style="border-left:3px solid ${btnCol};" data-id="${i.id}"><div style="display:flex;justify-content:space-between;align-items:flex-start;">${imgHtml}<div style="flex:1;">${catHtml}<span style="font-weight:900;font-size:1.15rem;color:#fff;">${nDisp}</span> ${i.oos?'<span style="background:#ff4d4d;color:#fff;font-size:0.7rem;padding:2px 5px;border-radius:5px;margin-left:5px;">OOS</span>':''}<br><span style="color:rgba(255,255,255,0.4);font-size:0.75rem;font-family:monospace;">ID: ${i.id}</span><br><b style="color:${btnCol};font-size:1.25rem;margin-top:3px;display:block;">${i.p} DT</b>${wrnHtml}</div><div style="width:140px;text-align:right;margin-left:10px;">${extHtml}${b}</div></div></div>`;
}

// --- CART MANAGEMENT ---
function addC(eO, p, eN, hasEx, exCount) {
    let id = decodeURIComponent(eO); 
    let n = decodeURIComponent(eN);
    if(hasEx) { 
        let extVals = []; 
        let missing = false;
        for(let j=0; j<exCount; j++) { 
            let inp = el(`ex-${id}-${j}`); 
            if(!inp || !inp.value) missing = true; 
            else { extVals.push(inp.value); inp.value = ''; } 
        }
        if(missing) n += " (⚠️ MISSING INFO)"; 
        else n += " (" + extVals.join(' | ') + ")";
    }
    cart.push({ id: id, n: n, p: parseFloat(p) }); 
    localStorage.setItem('ch_cart', JSON.stringify(cart));
    if(el('c-count')) el('c-count').innerText = cart.length; 
    toast(T[lang].scs, false);
}

function updC() {
    let r = cart.reduce((s, i) => s + i.p, 0); 
    el('m-sub').innerText = r.toFixed(2) + " DT";
    if(el('c-list')) {
        el('c-list').innerHTML = cart.map(i => {
            let nHtml = i.n; 
            if(nHtml.includes("⚠️ MISSING INFO")) { 
                nHtml = nHtml.replace("⚠️ MISSING INFO", "<b style='color:#ff4d4d;'>⚠️ MISSING INFO</b>"); 
            }
            return `<div style="padding:5px 0;border-bottom:1px solid #333;">• ${nHtml} (${i.p} DT)</div>`;
        }).join('');
    }
}

function opnCart() { 
    updC(); 
    openModal('cart-mod'); 
}

function shareCart() {
    if (cart.length === 0) return toast(T[lang].emp, true);
    let cartB64 = btoa(encodeURIComponent(JSON.stringify(cart)));
    let url = window.location.href.split('?')[0] + "?cart=" + cartB64;
    navigator.clipboard.writeText(url).then(() => {
        toast("Cart Link Copied! Send to a friend.", false);
    }).catch(() => toast("Failed to copy link", true));
}

// --- SECURE CHECKOUT & DISCOUNTS ---
function opnCO() {
    if(cart.length === 0) return toast(T[lang].emp, true);
    
    let hasMissingInfo = cart.some(i => i.n.includes("⚠️ MISSING INFO"));
    if (hasMissingInfo) {
        toast("Please provide the missing info!", "error");
        let missingFix = prompt("You missed some Extra Info (Player ID, Server, etc.). Please enter it here:");
        if(!missingFix) return toast("Cannot checkout without info.", true);
        cart = cart.map(i => { 
            if(i.n.includes("⚠️ MISSING INFO")) { i.n = i.n.replace(" (⚠️ MISSING INFO)", " ("+missingFix+")"); } 
            return i; 
        });
        updC();
    }

    let r = cart.reduce((s, i) => s + i.p, 0); 
    el('co-sub').innerText = r.toFixed(2) + " DT";
    
    // Build Selector
    let sel = el('co-disc-selector'); 
    sel.innerHTML = `<option value="None|0">No Discount</option>`;
    
    let lp = getHighestLoyaltyPct(); 
    if(lp > 0) sel.innerHTML += `<option value="Loyalty|${lp}">Loyalty Reward (${lp}%)</option>`;
    
    let sp = getStreakPct(); 
    if(sp > 0) sel.innerHTML += `<option value="Streak|${sp}">🔥 Active Streak (${sp}%)</option>`;
    
    let wActive = localStorage.getItem('ch_wheel_win') === 'true'; 
    if(wActive) sel.innerHTML += `<option value="Wheel|5">🎡 Wheel Spin (5%)</option>`;
    
    sel.innerHTML += `<option value="Promo|0">🎟️ Enter Promo Code...</option>`;
    
    if(el('tip-admin-cb')) el('tip-admin-cb').checked = false; // reset tip checkbox
    
    applySingleDiscount(); 
    closeModal('cart-mod'); 
    openModal('co-mod');
}

function applySingleDiscount() {
    let selVal = el('co-disc-selector').value.split('|');
    let type = selVal[0]; 
    let pct = parseFloat(selVal[1]);
    
    if(type === "Promo") { 
        el('promo-input-box').style.display = 'flex'; 
        pct = activeDiscount.type === "Promo" ? activeDiscount.pct : 0; 
    } 
    else { 
        el('promo-input-box').style.display = 'none'; 
        activeDiscount = { type: type, pct: pct, str: type + " Discount" }; 
    }
    
    let isTip = el('tip-admin-cb') && el('tip-admin-cb').checked;
    let tipAmt = isTip ? 1 : 0;

    let r = cart.reduce((s, i) => s + i.p, 0);
    let total = r - (r * (activeDiscount.pct / 100)) + tipAmt;
    
    el('co-tot').innerText = total.toFixed(2) + " DT";
    if(el('co-wal-bal')) el('co-wal-bal').innerText = userWallet.toFixed(2);
}

async function validatePromoCode() {
    let c = el('promo-code-val').value.toUpperCase(); 
    if(!c) return;
    toast("Checking...", "info");
    let d = await customFetch(window.CFG.SURL, { method: 'POST', body: JSON.stringify({ act: "validate_promo", code: c }) });
    if(d && d.s === 'ok') { 
        activeDiscount = { type: "Promo", pct: parseFloat(d.pct), str: c }; 
        toast("Promo Applied!", false); 
        applySingleDiscount(); 
    }
    else if(d && d.s === 'expired') { toast("Code Expired/Max Uses Reached", true); }
    else { toast("Invalid Code", true); }
}

function sPay(m) { 
    payM = m; 
    ['p-d17','p-mm','p-wal'].forEach(x => { if(el(x)) el(x).classList.remove('act') }); 
    el(m === 'D17' ? 'p-d17' : m === 'Mandat Minute' ? 'p-mm' : 'p-wal').classList.add('act'); 
    
    let dbox = el('d-box-pay'); 
    if(m === 'D17' || m === 'Mandat Minute') { 
        dbox.style.display = 'block'; 
        if(m === 'D17') { 
            el('ui-d17-in').innerText = window.CFG.D17; 
            el('qr-d17').style.display='inline-block'; 
        } else { 
            el('ui-d17-in').innerHTML = `${window.CFG.M_NAME}<br>${window.CFG.M_NUM}`; 
            el('qr-d17').style.display='none'; 
        } 
    } else { 
        dbox.style.display = 'none'; 
    } 
}

function handleProofUpload(e) { 
    let f = e.target.files[0]; 
    if(!f) return; 
    let r = new FileReader(); 
    r.onload = ev => proofB64 = ev.target.result; 
    r.readAsDataURL(f); 
}

async function finOrd() {
    if(navigator.vibrate) navigator.vibrate(100);
    let n = el('coN').value; 
    let c = el('coC').value; 
    let cm = el('coNts').value; 
    if(!n || !c) return toast(T[lang].rq, true);
    
    let isTip = el('tip-admin-cb') && el('tip-admin-cb').checked;
    let tipAmt = isTip ? 1 : 0;

    let r = cart.reduce((s, i) => s + i.p, 0); 
    let total = r - (r * (activeDiscount.pct / 100)) + tipAmt;
    cart.forEach(i => i.finalPrice = i.p - (i.p * (activeDiscount.pct / 100)));
    
    if(isTip) { 
        cart.push({ id: "TIP-001", n: "☕ Admin Coffee Tip", p: 1, finalPrice: 1 }); 
    }

    if(payM === 'Wallet' && userWallet < total) return toast(T[lang].noFunds, true);
    
    el('b-fin').innerHTML = `...`; 
    el('b-fin').disabled = true;
    
    try {
        let payload = { 
            act: "place_order", 
            client: n, 
            plat: "N/A", 
            contact: c, 
            items: cart, 
            appliedDiscountStr: activeDiscount.str + " (" + activeDiscount.pct + "%)", 
            payM: payM, 
            comments: cm, 
            c: user || "Guest", 
            proofB64: proofB64, 
            promoCode: activeDiscount.type === "Promo" ? activeDiscount.str : "", 
            usedWheel: activeDiscount.type === "Wheel" 
        };
        
        let d = await customFetch(window.CFG.SURL, { method: 'POST', body: JSON.stringify(payload) });
        
        if(d && d.s === "ok") {
            if(payM === 'Wallet') { 
                userWallet -= total; 
                localStorage.setItem('ch_wal', userWallet); 
                chkUI(); 
            }
            if(activeDiscount.type === "Streak") { 
                localStorage.setItem('ch_streak', 0); 
                loginStreak = 0; 
            } 
            if(activeDiscount.type === "Wheel") { 
                localStorage.setItem('ch_wheel_win', 'false'); 
            }
            
            let inv = `╔══════════════════════════════════╗\n║     💎 CYBERHUB ORDER TICKET     ║\n╚══════════════════════════════════╝\n👤 Client: ${n}\n🏷️ ID: ${d.gId}\n💰 Total: ${total.toFixed(2)} DT\n💳 Pay: ${payM}\n\n`;
            cart.forEach((i) => { 
                inv += `🔸 ${i.n}\n   Price: ${i.finalPrice.toFixed(2)} DT\n\n`; 
            });
            inv += `⏳ Our team will process this ticket\n   and contact you within 48 hours!`;
            
            navigator.clipboard.writeText(inv).catch(e=>{});
            try { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch(e) {}
            
            el('co-form').style.display = 'none'; 
            el('co-succ').style.display = 'block'; 
            el('succ-gid').innerText = d.gId;
            el('dm-btn').onclick = () => window.open(`https://wa.me/${window.CFG.WA}?text=${encodeURIComponent(inv)}`);
            
            cart = []; 
            localStorage.removeItem('ch_cart'); 
            el('c-count').innerText = "0"; 
            if(user) uOrders++;
            
        } else if(d && d.s === "fraud_detected") { 
            toast("Duplicate Receipt. Order Blocked.", true); 
        }
        
        el('b-fin').innerHTML = T[lang].plc; 
        el('b-fin').disabled = false;
        
    } catch(e) { 
        el('b-fin').innerHTML = T[lang].plc; 
        el('b-fin').disabled = false; 
        toast(T[lang].err, true); 
    }
}

// --- SPIN WHEEL LOGIC ---
function buildWheelUI() {
    let wc = el('wheel-container'); 
    wc.innerHTML = '';
    if(!db.wheel || db.wheel.length === 0) return;
    
    let sliceDeg = 360 / db.wheel.length;
    db.wheel.forEach((w, i) => {
        let slice = document.createElement('div'); 
        slice.className = 'wheel-slice';
        slice.style.background = w.c; 
        slice.style.transform = `rotate(${i * sliceDeg}deg) skewY(${90 - sliceDeg}deg)`;
        slice.innerHTML = `<span style="transform: skewY(${-(90 - sliceDeg)}deg) rotate(${sliceDeg / 2}deg) translateY(-80px); display:block;">${w.e}</span>`;
        wc.appendChild(slice);
    });
}

async function spinWheel() {
    if(wSpinning || !user) return toast(user ? "Wait..." : T[lang].rqLog, true); 
    wSpinning = true;
    
    let d = await customFetch(window.CFG.SURL, { method: 'POST', body: JSON.stringify({ act: 'log_spin', c: user, ip: userIP, prize: "Processing" }) });
    if(d && d.s === 'cooldown') { 
        wSpinning = false; 
        return toast("Come back tomorrow!", true); 
    }
    
    let r = Math.random() * 100; 
    let selectedIndex = 0; 
    let cumulative = 0;
    
    for(let i=0; i<db.wheel.length; i++) { 
        cumulative += parseFloat(db.wheel[i].winChance || 25); 
        if(r <= cumulative) { selectedIndex = i; break; } 
    }
    
    let sliceDeg = 360 / db.wheel.length; 
    let extraSpins = 5 * 360; 
    let stopDeg = extraSpins + (360 - (selectedIndex * sliceDeg)) - (sliceDeg / 2);
    
    let wc = el('wheel-container'); 
    wc.style.transform = `rotate(${stopDeg}deg)`;
    
    setTimeout(() => {
        wSpinning = false; 
        let wonObj = db.wheel[selectedIndex];
        
        if(wonObj.n.includes("Discount")) {
            localStorage.setItem('ch_wheel_win', 'true');
        }
        
        customFetch(window.CFG.SURL, { method: 'POST', body: JSON.stringify({ act: 'log_spin', c: user, ip: userIP, prize: wonObj.n }) }); 
        toast(`You got: ${wonObj.n} ${wonObj.e}`, false);
    }, 4500);
}

// Start
if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp); 
} else {
    initApp();
}
</script>
