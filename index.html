<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub | Digital Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>(function(){ emailjs.init("aVLHyVhILMDCu8T99"); })();</script>
    <style>
        :root { --primary: #00a8ff; --bg: #020617; --card: rgba(15, 23, 42, 0.95); --border: rgba(255,255,255,0.1); --text: #ffffff; --sub: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-y: auto; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; position: relative; z-index: 1; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary); margin: auto; display: block; background: #000; }
        .social-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .s-link { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; background: var(--card); border: 1px solid var(--border); font-size: 1.3rem; }
        .item-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg); padding: 25px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--primary); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        .copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; display: none; z-index: 3000; }
        footer { margin-top: 50px; text-align: center; font-size: 0.8rem; color: var(--sub); font-weight: bold; }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="copyToast" class="copy-toast">Order info copied! / Infos copiées !</div>

<div class="container">
    <div class="header" style="text-align:center;">
        <img src="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400" class="logo">
        <h2 style="color:var(--primary); margin-top:10px;">CYBERHUB</h2>
    </div>

    <div class="social-bar">
        <a href="https://wa.me/21629895846" class="s-link">📞</a>
        <a href="https://www.instagram.com/__cyber__hub__" class="s-link">📸</a>
        <a href="mailto:cyber.hub.contact.now@gmail.com" class="s-link">📧</a>
    </div>

    <input type="text" id="mainSearch" placeholder="Search / Rechercher..." onkeyup="filterItems()">
    <div id="content-area"></div>
    <div style="text-align:center; margin-top:20px; cursor:pointer;" onclick="openCart()">🛒 View Cart (<span id="cart-count">0</span>)</div>
    <footer>Made by Yessine Ben Fraj with ❤️</footer>
</div>

<div id="modal">
    <div class="modal-content">
        <div id="cart-view">
            <h3 id="cartTitle">🛒 Mon Panier</h3>
            <div id="cart-items-list" style="text-align:left; max-height:150px; overflow-y:auto;"></div>
            <div style="margin:15px 0; padding-top:10px; border-top:1px solid var(--border); font-weight:bold;">
                Total: <span id="cart-total-price">0</span> DT
            </div>
            <input type="text" id="promoInput" placeholder="Promo Code?" onkeyup="checkPromo()">
            <input type="text" id="custName" placeholder="Full Name / Nom">
            <input type="text" id="custContact" placeholder="Phone / Social Handle">
            <button class="add-btn" onclick="submitOrder()">Place Order / Commander</button>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--sub); margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>
</div>

<script>
    let cart = [];
    let promoData = [];
    let discount = 0;

    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "size": { "value": 1.5 }, "line_linked": { "opacity": 0.2 }, "move": { "speed": 1.2 } } });

    function generateOrderID() {
        return "CH-" + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    function submitOrder() {
        const orderID = generateOrderID();
        const name = document.getElementById('custName').value;
        const contact = document.getElementById('custContact').value;
        const total = document.getElementById('cart-total-price').innerText;
        const items = cart.map(i => `${i.name} (Note: ${i.comment})`).join(' | ');

        // STRICT SEPARATION LABELS FOR GOOGLE SHEET
        const body = `ORDER_ID: ${orderID}
CLIENT: ${name}
CONTACT: ${contact}
ITEMS: ${items}
PRICE: ${total} DT
NOTES: ${cart.map(i => i.comment).join('; ')}`;

        navigator.clipboard.writeText(body).then(() => {
            const toast = document.getElementById('copyToast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);

            emailjs.send("service_tjvcxv4", "template_r8b7yaf", {
                order_id: orderID,
                customer_name: name,
                message_body: body
            }).then(() => {
                alert(`Order ${orderID} sent! Details copied. / Commande envoyée !`);
                localStorage.removeItem('cyberhub_sync_cart');
                location.reload();
            });
        });
    }

    // Product loading, Search, Cart Sync, and Promo Logic remain as previously configured
</script>
</body>
</html>
