function mapSheetToObjects(sheetData) {
    if(!sheetData || !Array.isArray(sheetData) || sheetData.length === 0) return [];
    if (!Array.isArray(sheetData[0]) && typeof sheetData[0] === 'object') return sheetData; 
    let headers = sheetData[0].map(h => String(h||"").trim());
    return sheetData.slice(1).map(row => { 
        let obj = {}; 
        headers.forEach((h, i) => { obj[h] = (row && Array.isArray(row) && i < row.length) ? row[i] : ""; }); 
        return obj; 
    });
}

        let t = el('toast');

}

function getRating(id) { 
    if(!id) return "⭐⭐⭐⭐⭐ 5.0/5 (42)"; 
    let num = 0; let strId = String(id); for(let i=0; i<strId.length; i++) num += strId.charCodeAt(i); 
    let rating = 2.5 + ((num % 26) / 10); let fullStars = Math.floor(rating); let halfStar = (rating - fullStars >= 0.5) ? "✨" : ""; let stars = "⭐".repeat(fullStars) + halfStar; let count = (num % 150) + 30; return `${stars} ${rating.toFixed(1)}/5 (${count})`; 
}

function animateValue(obj, start, end, duration) { 
    if(!obj) return;
    let startTimestamp = null; 
    const step = (timestamp) => { 
        if (!startTimestamp) startTimestamp = timestamp; 
        const progress = Math.min((timestamp - startTimestamp) / duration, 1); 
        obj.innerHTML = Math.floor(progress * (end - start) + start); 
        if (progress < 1) window.requestAnimationFrame(step); 
    }; 
    window.requestAnimationFrame(step); 
}

            try { hMaint(d.maintObj); chkUI(); renderPolicy(); ren(); } catch(e) { console.error(e); let stCnt = el('st-cnt'); if(stCnt) stCnt.innerHTML = `<div style="text-align:center;padding:20px;color:#ff4d4d;"><b>Data render error:</b><br>${e.message}</div>`; } 
            
            if(db.isSurge && el('surge-banner')) el('surge-banner').style.display = 'block'; 
            if(db.flashSale && db.flashSale.active) { 
                if(el('flash-banner')) el('flash-banner').style.display = 'block'; 
                if(db.flashSale.timer) { 
                    let endTime = new Date(db.flashSale.timer).getTime(); 
                    setInterval(() => { 
                        let diff = endTime - Date.now(); 
                        if(diff <= 0) { if(el('flash-timer')) el('flash-timer').innerText = "SALE ENDED"; } 
                        else { 
                            let h = Math.floor(diff / (1000 * 60 * 60)); let mi = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); let s = Math.floor((diff % (1000 * 60)) / 1000); 
                            if(el('flash-timer')) el('flash-timer').innerText = `${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`; 
                        } 
                    }, 1000); 
                } else { if(el('flash-timer')) el('flash-timer').style.display = 'none'; } 
            } else { if(el('flash-banner')) el('flash-banner').style.display = 'none'; }
        } else if (!isDataLoaded) { let stCnt = el('st-cnt'); if(stCnt) stCnt.innerHTML = `<div style="text-align:center;padding:20px;color:#ff4d4d;"><b>API Offline.</b></div>`; }
    }).catch(e => { hideLoader(); }); 
    
    fetchSafeIP().then(ip => { userIP = ip; setInterval(() => { if(isTabVisible) { api('ping', { ip: role==='Admin' || role==='Moderator' ? 'Admin' : (userIP || 'Guest'), c: user||'Guest' }).then(res => { if(res && res.success) updateGodsEye(res.count); }); } }, 15000); }); 
}

function hMaint(m) { 
    if(!m) return; let b = el('maint-banner'), t = el('ui-m-m'), tit = el('ui-m-t'); 
    if(m.closed && m.bands) { if(el('stripe-1')) el('stripe-1').style.display = 'block'; if(el('stripe-2')) el('stripe-2').style.display = 'block'; } else { if(el('stripe-1')) el('stripe-1').style.display = 'none'; if(el('stripe-2')) el('stripe-2').style.display = 'none'; } 
    if(m.closed) { 
        if(b) b.style.display = 'block'; if(tit) tit.innerHTML = "STORE CLOSED"; if(t) t.innerHTML = m.msg; if(el('st-cnt')) el('st-cnt').style.display = 'none'; if(el('flash-banner')) el('flash-banner').style.display = 'none';
        if(m.timer && !isNaN(parseInt(m.timer))) { 
            let endTime = parseInt(m.timer); if(el('maint-timer')) el('maint-timer').style.display = 'block'; 
            clearInterval(maintTimerInterval); 
            maintTimerInterval = setInterval(() => { 
                let diff = endTime - Date.now(); 
                if(diff <= 0) { if(el('maint-timer')) el('maint-timer').innerText = "00:00:00"; clearInterval(maintTimerInterval); } 
                else { let h = Math.floor(diff / (1000 * 60 * 60)); let mi = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); let s = Math.floor((diff % (1000 * 60)) / 1000); if(el('maint-timer')) el('maint-timer').innerText = `${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`; } 
            }, 1000); 
        } else { if(el('maint-timer')) el('maint-timer').style.display = 'none'; }
    } else if(m.bMsg) { 
        if(b) b.style.display = 'block'; if(tit) tit.innerHTML = "ANNOUNCEMENT"; if(t) t.innerHTML = m.bMsg; if(el('st-cnt')) el('st-cnt').style.display = 'block'; if(el('maint-timer')) el('maint-timer').style.display = 'none'; 
    } else { 
        if(b) b.style.display = 'none'; if(el('st-cnt')) el('st-cnt').style.display = 'block'; 
    } 
}

function renderPolicy() { 
    let h = ""; 
    if(db.policy) { 
        let polObjs = mapSheetToObjects(db.policy); 
        polObjs.forEach(p => { 
            if(p['Title EN'] && p['Title EN'].trim() !== "") { 
                h += `<details><summary>${lang==='en'?p['Title EN']:p['Title FR']}</summary><p>${lang==='en'?p['Content EN']:p['Content FR']}</p></details>`; 
            } 
        }); 
    } 
    let polContent = el('pol-content'); 
    // 🎯 MATHEMATICAL NULL CHECK
    if (polContent) polContent.innerHTML = h; 
}

const b64ToArray = (str) => Uint8Array.from(atob(str || ''), c => c.charCodeAt(0)); 

// 🎯 HARD-CHECK FOR BIOMETRIC BINDING: Requires Password First
async function addBiometrics() { 
    let pw = el('admin-pass-input') ? el('admin-pass-input').value : ""; 
    if(pw !== window.CFG.PASS) { return toast(lang==='fr' ? "⚠️ Entrez le mot de passe principal d'abord!" : "⚠️ Enter Master Password first!", "error"); } 
    if (!window.PublicKeyCredential) return toast("Biometrics not supported.", "error"); 
    try { 
        const options = { publicKey: { challenge: new Uint8Array(32), rp: { name: "CyberHub" }, user: { id: new Uint8Array(16), name: user||"Admin", displayName: user||"Admin" }, pubKeyCredParams: [{ type: "public-key", alg: -7 }] } }; 
        const cred = await navigator.credentials.create(options); 
        localStorage.setItem(role==='Admin'?'ch_passkey_Admin':'ch_passkey_User', btoa(String.fromCharCode(...new Uint8Array(cred.rawId)))); 
        toast("Biometrics linked successfully!", "success"); 
    } catch(err) { toast("Registration failed.", "error"); } 
} 

async function loginBiometrics() { 
    let savedId = localStorage.getItem('ch_passkey_Admin'); 
    if(!savedId) return toast("No biometrics linked.", "error"); 
    try { 
        const options = { publicKey: { challenge: new Uint8Array(32), allowCredentials: [{ type: "public-key", id: b64ToArray(savedId) }] } }; 
        await navigator.credentials.get(options); 
        if(el('admin-pass-input')) el('admin-pass-input').value = window.CFG.PASS; 
        verifyAdminManual(); 
    } catch(err) { toast("Biometric failed.", "error"); } 
} 

async function revealPassword() { 
    let savedId = localStorage.getItem('ch_passkey_User'); 
    if(!savedId) return toast("Bind a device first to use vault.", "error"); 
    try { 
        const options = { publicKey: { challenge: new Uint8Array(32), allowCredentials: [{ type: "public-key", id: b64ToArray(savedId) }] } }; 
        await navigator.credentials.get(options); 
        showLoader("Decrypting..."); 
        let res = await api('get_password', {email: user}); 
        hideLoader(); 
        if(res && res.s === 'ok') { let pBox = el('pw-reveal-box'); if(pBox) { pBox.innerText = res.pwd; pBox.style.display = 'block'; } } 
        else { toast("Vault Error", "error"); } 
    } catch(err) { toast("Verification failed.", "error"); } 
}

    let adminEditHtml = role === 'Admin' ? `<div class="edit-badge" onclick="admEditItem('${i.id}', '${sEnc(i.nEn)}', '${sEnc(i.nFr)}', ${i.baseP}, '${i.status}', '${sEnc(i.cat)}', '${sEnc(i.sub)}', '${sEnc(i.img)}', '${i.exReq}', '${i.exNum}', '${sEnc(i.rawExEn)}', '${sEnc(i.rawExFr)}')">EDIT</div>` : '';
    let dragTag = role === 'Admin' ? `draggable="true" ondragstart="dragStart(event, '${i.id}')" ondragend="dragEnd(event)"` : '';

    return `<div class="i-row" ${dragTag} style="border-left:3px solid ${btnCol};" data-id="${i.id}">${adminEditHtml}<div style="display:flex;justify-content:space-between;align-items:flex-start;">${imgHtml}<div style="flex:1;">${catHtml}<span style="font-weight:900;font-size:1.15rem;color:#fff;">${nDisp}${flashBadge}</span><span style="cursor:pointer; margin-left:10px; font-size:1.1rem;" onclick="tgWish('${i.id}')">${isWished}</span><br><span style="color:rgba(255,255,255,0.4);font-size:0.75rem;font-family:monospace;">ID: ${i.id}</span>${revHtml}<b style="color:${i.isFlash ? '#00f0ff' : btnCol};font-size:1.25rem;margin-top:3px;display:block;">${i.origHtml}${i.p.toFixed(2)} DT</b>${wrnHtml}</div><div style="width:100px;text-align:right;margin-left:10px;">${b}</div></div></div>`;

function calcImportPrice() { 
    let amt = parseFloat(el('imp-amt').value); 
    if(isNaN(amt) || amt <= 0) { 
        if(el('imp-cost-disp')) el('imp-cost-disp').innerText = "0.00 DT"; 
        if(el('imp-margin-disp')) el('imp-margin-disp').innerText = "0.00 DT"; 
        if(el('imp-final-disp')) el('imp-final-disp').innerText = "0.00 DT"; 
        tempImportCost = 0; tempImportFinal = 0; return; 
    } 
    let rate = db.euroRate || 4.35; let baseCostDT = amt * rate; let marginPct = 0.20; let fixedFees = 15.00; 
    let totalMarginAndFees = (baseCostDT * marginPct) + fixedFees; let finalPrice = baseCostDT + totalMarginAndFees; 
    tempImportCost = baseCostDT; tempImportFinal = finalPrice; 
    if(el('imp-cost-disp')) el('imp-cost-disp').innerText = baseCostDT.toFixed(2) + " DT"; 
    if(el('imp-margin-disp')) el('imp-margin-disp').innerText = totalMarginAndFees.toFixed(2) + " DT"; 
    if(el('imp-final-disp')) el('imp-final-disp').innerText = finalPrice.toFixed(2) + " DT"; 
}

function validateImportLink() { 
    let linkElem = el('imp-link'); if(!linkElem) return true; 
    let link = linkElem.value.trim().toLowerCase(); if(!link) return true; 
    let isFrance = link.includes('.fr') || link.includes('/fr') || link.includes('fr.'); 
    if(!isFrance && link.length > 8) { toast("Link must be from the France (FR) region! Ensure the URL contains '.fr'.", "error"); linkElem.style.borderColor = "#ff4d4d"; return false; } 
    linkElem.style.borderColor = "var(--b)"; return true; 
}

function addImportToCart() { 
    if(db.globalOos) return toast("Importer is offline", "error"); 
    if(!validateImportLink()) return; 
    let link = el('imp-link') ? el('imp-link').value.trim() : ""; 
    if(!link) return toast("Please paste the product/cart link.", "error"); 
    if(tempImportFinal <= 0) return toast("Enter a valid amount in Euros.", "error"); 
    
    let store = el('imp-store') ? el('imp-store').value : "Import"; 
    let foreignAmt = el('imp-amt') ? el('imp-amt').value : "0"; 
    let itemName = `🌍 Import: ${store} [${foreignAmt} €] (Link: ${link})`; 
    let itemId = `IMP-${store.toUpperCase()}-${Math.floor(Math.random()*9000+1000)}`; 
    
    cart.push({ id: itemId, n: itemName, p: parseFloat(tempImportFinal.toFixed(2)), c: parseFloat(tempImportCost.toFixed(2)), finalPrice: parseFloat(tempImportFinal.toFixed(2)), qty: 1 }); 
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    if(el('c-count')) el('c-count').innerText = cart.reduce((s,i)=>s+(i.qty||1),0); 
    
    try{if(db.sObj&&db.sObj.s_add){new Audio(db.sObj.s_add).play()}}catch(e){} 
    if(el('cart-action-mod')) el('cart-action-mod').style.display='flex'; 
    if(el('imp-amt')) el('imp-amt').value = ''; 
    if(el('imp-link')) el('imp-link').value = ''; 
    calcImportPrice(); closeModal('import-mod'); 
}

function buyCoffee() { 
    let amt = prompt(lang==='fr' ? "Combien souhaitez-vous offrir (DT) ?" : "How much would you like to tip (DT)?", "5"); 
    if(!amt || isNaN(parseFloat(amt)) || parseFloat(amt) <= 0) return;

    cart.push({ id: "TIP-" + Math.floor(Math.random()*10000), n: "☕ Admin Coffee Tip", p: tipAmt, finalPrice: tipAmt, qty: 1, exReq: false });

    if(el('c-count')) el('c-count').innerText = cart.reduce((s,i)=>s+(i.qty||1),0);

function addC(eO, p, eN, hasEx, exCount, exTxtStr) { 
    let id = decodeURIComponent(eO); let n = decodeURIComponent(eN); 
    let existing = cart.find(x => x.id === id && x.n === n); 
    if(existing && !hasEx) { existing.qty++; } 
    else { cart.push({ id: id, n: n, p: parseFloat(p), finalPrice: parseFloat(p), qty: 1, exReq: hasEx, exNum: exCount, exTxt: decodeURIComponent(exTxtStr||'') }); } 
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    if(el('c-count')) el('c-count').innerText = cart.reduce((s,i)=>s+(i.qty||1),0); 
    try{if(db.sObj&&db.sObj.s_add){new Audio(db.sObj.s_add).play()}}catch(e){} 
    if(el('cart-action-mod')) el('cart-action-mod').style.display='flex'; 
}

function adjQty(idx, amt) { cart[idx].qty += amt; if(cart[idx].qty <= 0) cart.splice(idx, 1); localStorage.setItem('ch_cart', JSON.stringify(cart)); if(el('c-count')) el('c-count').innerText = cart.reduce((s,i)=>s+(i.qty||1),0); updC(); }

function updC() { 
    let r = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    if(el('m-sub')) el('m-sub').innerText = r.toFixed(2) + " DT"; 
    if(el('c-list')) { 
        el('c-list').innerHTML = cart.map((i, idx) => { 
            return `<div style="padding:10px 0;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;"><span style="flex:1;">• ${i.n}</span><div style="display:flex; align-items:center; gap:10px;"><span style="color:var(--p); font-weight:bold;">${(i.p * (i.qty||1)).toFixed(2)} DT</span><div style="display:flex; align-items:center; background:#111; border-radius:5px; padding:2px;"><button class="qty-btn" onclick="adjQty(${idx}, -1)">-</button><span style="margin:0 10px; font-family:monospace;">${i.qty||1}</span><button class="qty-btn" onclick="adjQty(${idx}, 1)">+</button></div></div></div>`; 
        }).join(''); 
    } 
}

function opnCart() { updC(); openModal('cart-mod'); }

function shareCart() { 
    if (cart.length === 0) return toast("Cart Empty", "error"); 
    let cartB64 = btoa(encodeURIComponent(JSON.stringify(cart))); 
    navigator.clipboard.writeText(window.location.href.split('?')[0] + "?cart=" + cartB64).then(() => { toast("Cart Link Copied!", false); }).catch(() => toast("Failed to copy", true));

    if(cart.length === 0) return toast("Cart Empty", "error"); 
    let total = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    if(db.minOrder && db.minOrder > 0 && total < db.minOrder) { return toast(`Minimum order is ${db.minOrder} DT`, "error"); }

function adjTip(amt) { let t = el('tip-admin-amt'); if(!t) return; let val = parseInt(t.value) + amt; if(val < 0) val = 0; t.value = val; applySingleDiscount(); }

function applySingleDiscount() { 
    let selElem = el('co-disc-selector'); if(!selElem) return; 
    let selVal = selElem.value.split('|'); let type = selVal[0]; let pct = parseFloat(selVal[1]); 
    
    if(type === "Promo") { 
        if(el('promo-input-box')) el('promo-input-box').style.display = 'flex'; 
        pct = activeDiscount.type === "Promo" ? activeDiscount.pct : 0; 
    } else { 
        if(el('promo-input-box')) el('promo-input-box').style.display = 'none'; 
        activeDiscount = { type: type, pct: pct, str: type + " Discount" }; 
    } 
    
    let r = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); let afterDiscount = r - (r * (activeDiscount.pct / 100)); 
    let tipElem = el('tip-admin-amt'); let tipAmt = tipElem ? parseFloat(tipElem.value) || 0 : 0; 
    let feePct = 0; if(payM === 'D17') feePct = 0.01; if(payM === 'Mandat Minute') feePct = 0.02; 
    let feeAmt = afterDiscount * feePct; 
    
    if(feePct > 0) { 
        if(el('fee-disp')) el('fee-disp').style.display = 'block'; 
        if(el('fee-amt')) el('fee-amt').innerText = feeAmt.toFixed(2); 
        if(el('fee-pct')) el('fee-pct').innerText = (feePct * 100).toFixed(0); 
    } else { 
        if(el('fee-disp')) el('fee-disp').style.display = 'none'; 
    } 
    
    let total = afterDiscount + feeAmt + tipAmt; 
    if(el('co-tot')) el('co-tot').innerText = total.toFixed(2) + " DT"; 
    if(el('co-wal-bal')) el('co-wal-bal').innerText = userWallet.toFixed(2); 
}

async function validatePromoCode() {

    showLoader("Checking Code..."); let d = await api("validate_promo", { code: c }); hideLoader(); 
    if(d && d.s === 'ok') { activeDiscount = { type: "Promo", pct: parseFloat(d.pct), str: c }; toast("Promo Applied!", false); applySingleDiscount(); } 
    else if(d && d.s === 'expired') { toast("Code Expired", true); } else { toast("Invalid Code", true); }

function sPay(m) { 
    payM = m; 
    ['p-d17','p-mm','p-wal','p-later', 'p-cash-hl'].forEach(x => { let e = el(x); if(e) e.classList.remove('act') }); 
    
    if(m === 'D17' && el('p-d17')) el('p-d17').classList.add('act'); 
    else if(m === 'Mandat Minute' && el('p-mm')) el('p-mm').classList.add('act'); 
    else if(m === 'Wallet' && el('p-wal')) el('p-wal').classList.add('act'); 
    else if(m === 'Pay Later' && el('p-later')) el('p-later').classList.add('act'); 
    else if(m === 'Cash Hammam-Lif' && el('p-cash-hl')) el('p-cash-hl').classList.add('act'); 
    
    let dbox = el('d-box-pay'); 
    if(dbox) { 
        if(m === 'D17' || m === 'Mandat Minute' || m === 'Cash Hammam-Lif') { 
            dbox.style.display = 'block'; 
            if(m === 'D17') { 
                if(el('ui-d17-in')) el('ui-d17-in').innerText = window.CFG.D17; 
                if(el('qr-d17')) el('qr-d17').style.display='block'; 
                if(el('ui-pay-inst')) el('ui-pay-inst').innerText = "Transfer to D17:";

                if(el('qr-d17')) el('qr-d17').style.display='none'; 
                if(el('ui-pay-inst')) el('ui-pay-inst').innerText = "Transfer to Mandat Minute:"; 
                if(el('upload-section-wrap')) el('upload-section-wrap').style.display = 'block'; 
            } else if(m === 'Cash Hammam-Lif') { 
                if(el('ui-d17-in')) el('ui-d17-in').innerHTML = `📍 Hammam-Lif Center`; 
                if(el('qr-d17')) el('qr-d17').style.display='none';

                if(el('upload-section-wrap')) el('upload-section-wrap').style.display = 'none'; 
            } 
        } else { dbox.style.display = 'none'; } 
    }

function mapSheetToObjects(sheetData) {
    if (!sheetData || !Array.isArray(sheetData) || sheetData.length === 0) {
        return [];

    if (!Array.isArray(sheetData[0]) && typeof sheetData[0] === 'object') {

        headers.forEach((h, i) => {

function getRating(id) { 
    if (!id) return "⭐⭐⭐⭐⭐ 5.0/5 (42)"; 
    
    let num = 0; 
    let strId = String(id); 
    
    for (let i = 0; i < strId.length; i++) {
        num += strId.charCodeAt(i); 
    }
    
    let rating = 2.5 + ((num % 26) / 10); 
    let fullStars = Math.floor(rating); 
    let halfStar = (rating - fullStars >= 0.5) ? "✨" : ""; 
    let stars = "⭐".repeat(fullStars) + halfStar; 
    let count = (num % 150) + 30; 
    
    return `${stars} ${rating.toFixed(1)}/5 (${count})`; 
}

        for (let i = 1; i < d.length; i++) {

    } catch(e) {

    }

function animateValue(obj, start, end, duration) { 
    if (!obj) return;
    
    let startTimestamp = null; 
    const step = (timestamp) => { 
        if (!startTimestamp) startTimestamp = timestamp; 
        
        const progress = Math.min((timestamp - startTimestamp) / duration, 1); 
        obj.innerHTML = Math.floor(progress * (end - start) + start); 
        
        if (progress < 1) {
            window.requestAnimationFrame(step); 
        }
    }; 
    window.requestAnimationFrame(step); 
}

    if (role === 'Admin' || role === 'Moderator') { 
        if (eye) eye.classList.add('admin-eye');

    } else { 
        if (eye) eye.classList.remove('admin-eye'); 
        let isClosed = db.maintObj && db.maintObj.closed; 
        let min = isClosed ? 2 : 35; 
        let max = isClosed ? 5 : 200; 
        
        if (Math.random() > 0.3) { 
            let target = Math.floor(Math.random() * (max - min + 1)) + min; 
            animateValue(elCount, currentVal, target, 2000); 
        } 
    } 
}

function hMaint(m) { 
    if (!m) return; 
    
    let b = el('maint-banner');
    let t = el('ui-m-m');
    let tit = el('ui-m-t'); 
    let s1 = el('stripe-1');
    let s2 = el('stripe-2');
    
    if (m.closed && m.bands) { 
        if (s1) s1.style.display = 'block'; 
        if (s2) s2.style.display = 'block'; 
    } else { 
        if (s1) s1.style.display = 'none'; 
        if (s2) s2.style.display = 'none'; 
    } 
    
    if (m.closed) { 
        if (b) b.style.display = 'block'; 
        if (tit) tit.innerHTML = "STORE CLOSED"; 
        if (t) t.innerHTML = m.msg; 
        
        let stCnt = el('st-cnt');
        if (stCnt) stCnt.style.display = 'none'; 
        
        let fBanner = el('flash-banner');
        if (fBanner) fBanner.style.display = 'none';
        
        let mTimer = el('maint-timer');
        if (m.timer && !isNaN(parseInt(m.timer))) { 
            let endTime = parseInt(m.timer); 
            if (mTimer) mTimer.style.display = 'block'; 
            
            clearInterval(maintTimerInterval); 
            
            maintTimerInterval = setInterval(() => { 
                let diff = endTime - Date.now(); 
                
                if (diff <= 0) { 
                    if (mTimer) mTimer.innerText = "00:00:00"; 
                    clearInterval(maintTimerInterval); 
                } else { 
                    let h = Math.floor(diff / (1000 * 60 * 60)); 
                    let mi = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)); 
                    let s = Math.floor((diff % (1000 * 60)) / 1000); 
                    if (mTimer) mTimer.innerText = `${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`; 
                } 
            }, 1000); 
        } else { 
            if (mTimer) mTimer.style.display = 'none'; 
        }
    } else if (m.bMsg) { 
        if (b) b.style.display = 'block'; 
        if (tit) tit.innerHTML = "ANNOUNCEMENT"; 
        if (t) t.innerHTML = m.bMsg; 
        
        let stCnt = el('st-cnt');
        if (stCnt) stCnt.style.display = 'block'; 
        
        let mTimer = el('maint-timer');
        if (mTimer) mTimer.style.display = 'none'; 
    } else { 
        if (b) b.style.display = 'none'; 
        
        let stCnt = el('st-cnt');
        if (stCnt) stCnt.style.display = 'block'; 
    } 
}

function renderAdminOrders(statusFilter = "All") { 
    let tbody = el('a-t-orders'); 
    if (!tbody) return; 
    
    tbody.innerHTML = ''; 
    let ordersObj = mapSheetToObjects(adminDataCache.orders).reverse(); 
    
    ordersObj.forEach(o => { 
        if (!o['Order ID']) return; 
        if (statusFilter !== "All" && o.Status !== statusFilter) return; 
        
        let readableItems = o.Items; 
        try { 
            let itemArr = JSON.parse(o.Items); 
            readableItems = itemArr.map(i => `${i.qty||1}x ${i.n}`).join(', '); 
        } catch(e) {} 
        
        tbody.innerHTML += `<tr>
            <td>${o['Order ID']}</td>
            <td>${o['Client Name']}<br><span style="color:gray;font-size:0.7rem">${o.Contact}</span></td>
            <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${readableItems}">${readableItems}</td>

            <td><select onchange="admOrderAction('${o['Order ID']}', this.value)" style="padding:5px; margin:0; background:#000!important; color:${o.Status==='Pending'?'#ff4d4d':(o.Status==='Processing'?'#ffae00':(o.Status==='Payment Verified'?'#8b5cf6':'#00ff88'))}!important; font-weight:bold;"><option value="${o.Status}" selected hidden>${o.Status}</option><option value="Pending">Pending</option><option value="Payment Verified">Payment Verified</option><option value="Processing">Processing</option><option value="Delivered">Delivered</option><option value="Cancelled">Cancelled</option></select></td>

async function initiateSignup() {

        wa: rWa ? rWa.value.trim() : "",

    }; 
    
    if (!tempReg.n || !tempReg.c || !tempReg.p) {
        return toast("Name, Email, and Password required.", "error"); 
    }
    
    if (!isValidEmail(tempReg.c)) {

            if (br) br.disabled = false; 
            let bo = el('btn-otp');
            if (bo) bo.disabled = false; 
        }, 90000); 
    } 
    else if (res && res.s === 'cooldown') { 
        toast("Too many requests. Wait 90s.", "error"); 
        let br = el('btn-reg');
        if (br) br.disabled = false; 
    } 
    else { 
        toast("Failed to send OTP.", "error");

const b64ToArray = (str) => Uint8Array.from(atob(str || ''), c => c.charCodeAt(0)); 

// 🎯 HARD-CHECK FOR BIOMETRIC BINDING: Requires Password First
async function addBiometrics() { 
    let pInput = el('admin-pass-input');
    let pw = pInput ? pInput.value : ""; 
    
    if (pw !== window.CFG.PASS) { 
        return toast(lang === 'fr' ? "⚠️ Entrez le mot de passe principal d'abord!" : "⚠️ Enter Master Password first!", "error"); 
    } 
    
    if (!window.PublicKeyCredential) {
        return toast("Biometrics not supported.", "error"); 
    }
    
    try { 
        const options = { 
            publicKey: { 
                challenge: new Uint8Array(32), 
                rp: { name: "CyberHub" }, 
                user: { id: new Uint8Array(16), name: user || "Admin", displayName: user || "Admin" }, 
                pubKeyCredParams: [{ type: "public-key", alg: -7 }] 
            } 
        }; 
        
        const cred = await navigator.credentials.create(options); 
        
        localStorage.setItem(role === 'Admin' ? 'ch_passkey_Admin' : 'ch_passkey_User', btoa(String.fromCharCode(...new Uint8Array(cred.rawId)))); 
        toast("Biometrics linked successfully!", "success"); 
        
    } catch(err) { 
        toast("Registration failed.", "error"); 
    } 
}

function navTo(t, c, a) { 
    cView.t = t; 
    cView.c = c ? decodeURIComponent(c) : null; 
    cView.a = a ? decodeURIComponent(a) : null; 
    
    let finder = el('itemFinder');

function highlightMatch(text, query) { 
    if (!query) return text; 
    let regex = new RegExp(`(${query})`, "gi"); 
    return text.replace(regex, "<span style='color:var(--w); text-shadow:0 0 8px var(--w); font-weight:bold;'>$1</span>"); 
}

function dR(i, q = "") { 
    let eO = sEnc(i.id); 
    let eN = sEnc(`${i.cat} > ${i.sub ? i.sub + ' > ' : ''}${i.n}`); 
    let wrnHtml = i.wrn ? `<div style="color:var(--w);font-size:0.75rem;margin-top:5px;font-weight:bold;">⚠️ ${i.wrn}</div>` : ''; 
    let btnCol = i.col || 'var(--p)'; 
    
    let catHtml = (i.cat && i.sub) 
        ? `<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">${i.cat} <span style="color:${btnCol};opacity:0.8;">▶</span> ${i.sub}</div>` 
        : `<div style="font-size:0.7rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">${i.cat}</div>`; 
        
    let imgHtml = i.img ? `<img src="${i.img}" onerror="this.style.display='none'" class="img-transparent" style="width:50px; height:50px; margin-right:15px;">` : ''; 
    let nDisp = q ? highlightMatch(i.n, q) : i.n; 
    let revHtml = `<div style="font-size:0.75rem; color:#ffae00; margin-top:3px;">${getRating(i.id)}</div>`; 

    let nStr = String(i.n).toLowerCase(); 
    let catStr = String(i.cat).toLowerCase();
    let isImport = nStr.includes("import") || nStr.includes("shein") || nStr.includes("amazon") || nStr.includes("aliexpress") || catStr.includes("import") || catStr.includes("shein");
    let flashBadge = i.isFlash ? `<span class="badge" style="animation: shimmer 2s infinite linear;">⚡ SALE</span>` : "";
    
    if (uOrders > 10 && Math.random() > 0.8 && !i.isFlash) {
        flashBadge = `<span class="badge" style="background:#00f0ff;">🔥 HOT</span>`;
    }
    
    let b = '';
    if (i.oos) { 
        b = `<button class="btn" style="background:#333;color:#777;margin:0;" disabled>OOS</button><button class="btn" style="background:transparent;border:1px solid var(--p);color:var(--p);font-size:0.7rem;padding:8px;margin-top:5px;" onclick="reqWaitlist('${i.id}')">🔔 Notify Me</button>`; 
    } 
    else if (isImport) { 
        b = `<button class="btn" style="margin:0;background:${btnCol};color:#000;" onclick="openModal('import-mod');">${T[lang].add}</button>`; 
    } 
    else { 
        b = `<button class="btn" style="margin:0;background:${btnCol};color:#000;" onclick="addC('${eO}',${i.p},'${eN}',${i.exReq}, ${i.exNum}, '${sEnc(i.exTxt)}');">${T[lang].add}</button>`; 
    }

    let adminEditHtml = role === 'Admin' ? `<div class="edit-badge" onclick="admEditItem('${i.id}', '${sEnc(i.nEn)}', '${sEnc(i.nFr)}', ${i.baseP}, '${i.status}', '${sEnc(i.cat)}', '${sEnc(i.sub)}', '${sEnc(i.img)}', '${i.exReq}', '${i.exNum}', '${sEnc(i.rawExEn)}', '${sEnc(i.rawExFr)}')">EDIT</div>` : '';
    let dragTag = role === 'Admin' ? `draggable="true" ondragstart="dragStart(event, '${i.id}')" ondragend="dragEnd(event)"` : '';
    let isWished = savedWishlist.includes(i.id) ? '❤️' : '🤍';

    return `<div class="i-row" ${dragTag} style="border-left:3px solid ${btnCol};" data-id="${i.id}">
                ${adminEditHtml}
                <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                    ${imgHtml}
                    <div style="flex:1;">
                        ${catHtml}
                        <span style="font-weight:900;font-size:1.15rem;color:#fff;">${nDisp}${flashBadge}</span>
                        <span style="cursor:pointer; margin-left:10px; font-size:1.1rem;" onclick="tgWish('${i.id}')">${isWished}</span><br>
                        <span style="color:rgba(255,255,255,0.4);font-size:0.75rem;font-family:monospace;">ID: ${i.id}</span>
                        ${revHtml}
                        <b style="color:${i.isFlash ? '#00f0ff' : btnCol};font-size:1.25rem;margin-top:3px;display:block;">${i.origHtml}${i.p.toFixed(2)} DT</b>
                        ${wrnHtml}
                    </div>
                    <div style="width:100px;text-align:right;margin-left:10px;">${b}</div>
                </div>
            </div>`; 
}

function calcImportPrice() { 
    let amtInput = el('imp-amt');
    let amt = amtInput ? parseFloat(amtInput.value) : 0; 
    
    if (isNaN(amt) || amt <= 0) { 
        if (el('imp-cost-disp')) el('imp-cost-disp').innerText = "0.00 DT"; 
        if (el('imp-margin-disp')) el('imp-margin-disp').innerText = "0.00 DT"; 
        if (el('imp-final-disp')) el('imp-final-disp').innerText = "0.00 DT"; 
        tempImportCost = 0; 
        tempImportFinal = 0; 
        return; 
    } 
    
    let rate = db.euroRate || 4.35; 
    let baseCostDT = amt * rate; 
    let marginPct = 0.20; 
    let fixedFees = 15.00; 
    
    let totalMarginAndFees = (baseCostDT * marginPct) + fixedFees; 
    let finalPrice = baseCostDT + totalMarginAndFees; 
    
    tempImportCost = baseCostDT; 
    tempImportFinal = finalPrice; 
    
    if (el('imp-cost-disp')) el('imp-cost-disp').innerText = baseCostDT.toFixed(2) + " DT"; 
    if (el('imp-margin-disp')) el('imp-margin-disp').innerText = totalMarginAndFees.toFixed(2) + " DT"; 
    if (el('imp-final-disp')) el('imp-final-disp').innerText = finalPrice.toFixed(2) + " DT"; 
}

function validateImportLink() { 
    let linkElem = el('imp-link'); 
    if (!linkElem) return true; 
    
    let link = linkElem.value.trim().toLowerCase(); 
    if (!link) return true; 
    
    let isFrance = link.includes('.fr') || link.includes('/fr') || link.includes('fr.'); 
    if (!isFrance && link.length > 8) { 
        toast("Link must be from the France (FR) region! Ensure the URL contains '.fr'.", "error"); 
        linkElem.style.borderColor = "#ff4d4d"; 
        return false; 
    } 
    linkElem.style.borderColor = "var(--b)"; 
    return true; 
}

function addImportToCart() { 
    if (db.globalOos) {
        return toast("Importer is offline", "error"); 
    }
    
    if (!validateImportLink()) return; 
    
    let linkInput = el('imp-link');
    let link = linkInput ? linkInput.value.trim() : ""; 
    
    if (!link) {
        return toast("Please paste the product/cart link.", "error"); 
    }
    
    if (tempImportFinal <= 0) {
        return toast("Enter a valid amount in Euros.", "error"); 
    }
    
    let storeInput = el('imp-store');
    let store = storeInput ? storeInput.value : "Import"; 
    
    let foreignAmtInput = el('imp-amt');
    let foreignAmt = foreignAmtInput ? foreignAmtInput.value : "0"; 
    
    let itemName = `🌍 Import: ${store} [${foreignAmt} €] (Link: ${link})`; 
    let itemId = `IMP-${store.toUpperCase()}-${Math.floor(Math.random()*9000+1000)}`; 
    
    cart.push({ 
        id: itemId, 
        n: itemName, 
        p: parseFloat(tempImportFinal.toFixed(2)), 
        c: parseFloat(tempImportCost.toFixed(2)), 
        finalPrice: parseFloat(tempImportFinal.toFixed(2)), 
        qty: 1 
    }); 
    
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    
    let cCount = el('c-count');
    if (cCount) cCount.innerText = cart.reduce((s,i) => s + (i.qty||1), 0); 
    
    try {
        if (db.sObj && db.sObj.s_add) {
            new Audio(db.sObj.s_add).play();
        }
    } catch(e) {} 
    
    let cartMod = el('cart-action-mod');
    if (cartMod) cartMod.style.display = 'flex'; 
    
    if (foreignAmtInput) foreignAmtInput.value = ''; 
    if (linkInput) linkInput.value = ''; 
    
    calcImportPrice(); 
    closeModal('import-mod'); 
}

function buyCoffee() {

function addC(eO, p, eN, hasEx, exCount, exTxtStr) { 
    let id = decodeURIComponent(eO); 
    let n = decodeURIComponent(eN); 
    let existing = cart.find(x => x.id === id && x.n === n); 
    
    if (existing && !hasEx) { 
        existing.qty++; 
    } else { 
        cart.push({ 
            id: id, 
            n: n, 
            p: parseFloat(p), 
            finalPrice: parseFloat(p), 
            qty: 1, 
            exReq: hasEx, 
            exNum: exCount, 
            exTxt: decodeURIComponent(exTxtStr||'') 
        }); 
    } 
    
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    
    let cCount = el('c-count');
    if (cCount) cCount.innerText = cart.reduce((s,i) => s + (i.qty||1), 0); 
    
    try {
        if (db.sObj && db.sObj.s_add) {
            new Audio(db.sObj.s_add).play();
        }
    } catch(e) {} 
    
    let cartMod = el('cart-action-mod');
    if (cartMod) cartMod.style.display = 'flex'; 
}

function adjQty(idx, amt) { 
    cart[idx].qty += amt; 
    if (cart[idx].qty <= 0) {
        cart.splice(idx, 1); 
    }
    
    localStorage.setItem('ch_cart', JSON.stringify(cart)); 
    
    let cCount = el('c-count');
    if (cCount) cCount.innerText = cart.reduce((s,i) => s + (i.qty||1), 0); 
    
    updC(); 
}

function updC() { 
    let r = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    
    let mSub = el('m-sub');
    if (mSub) mSub.innerText = r.toFixed(2) + " DT"; 
    
    let cList = el('c-list');
    if (cList) { 
        cList.innerHTML = cart.map((i, idx) => { 
            return `<div style="padding:10px 0;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;">
                        <span style="flex:1;">• ${i.n}</span>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="color:var(--p); font-weight:bold;">${(i.p * (i.qty||1)).toFixed(2)} DT</span>
                            <div style="display:flex; align-items:center; background:#111; border-radius:5px; padding:2px;">
                                <button class="qty-btn" onclick="adjQty(${idx}, -1)">-</button>
                                <span style="margin:0 10px; font-family:monospace;">${i.qty||1}</span>
                                <button class="qty-btn" onclick="adjQty(${idx}, 1)">+</button>
                            </div>
                        </div>
                    </div>`; 
        }).join(''); 
    } 
}

function opnCart() { 
    updC();

}

function shareCart() { 
    if (cart.length === 0) return toast("Cart Empty", "error"); 
    
    let cartB64 = btoa(encodeURIComponent(JSON.stringify(cart))); 
    navigator.clipboard.writeText(window.location.href.split('?')[0] + "?cart=" + cartB64).then(() => { 
        toast("Cart Link Copied!", false); 
    }).catch(() => {
        toast("Failed to copy", true);

function opnCO() { 
    if (cart.length === 0) return toast("Cart Empty", "error"); 
    
    let total = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    if (db.minOrder && db.minOrder > 0 && total < db.minOrder) {

                }

                                    <span style="float:right; color:var(--p);">${(i.p*(i.qty||1)).toFixed(2)} DT</span>
                                    ${exHtml}
                                 </div>`; 
        }); 
    } 
    
    let selCont = el('co-contact-method'); 
    let savedIG = localStorage.getItem('ch_ig'); 
    let savedWA = localStorage.getItem('ch_wa'); 
    let opts = ""; 
    
    if (savedIG) opts += `<option value="${savedIG}">Instagram (${savedIG})</option>`; 
    if (savedWA) opts += `<option value="${savedWA}">WhatsApp (${savedWA})</option>`; 
    
    opts += `<option value="new_ig" class="tr" data-k="typig">${T[lang].typig}</option><option value="new_wa" class="tr" data-k="typwa">${T[lang].typwa}</option>`; 
    
    if (selCont) selCont.innerHTML = opts; 
    updateCheckoutContact(); 
    
    let sel = el('co-disc-selector'); 
    if (sel) { 
        sel.innerHTML = `<option value="None|0">No Discount</option>`; 
        
        let lp = getHighestLoyaltyPct(); 
        if (lp > 0) sel.innerHTML += `<option value="Loyalty|${lp}">Loyalty Reward (${lp}%)</option>`; 
        
        let sp = getStreakPct(); 
        if (sp > 0) sel.innerHTML += `<option value="Streak|${sp}">🔥 Active Streak (${sp}%)</option>`; 
        
        let wActive = localStorage.getItem('ch_wheel_win') === 'true'; 
        if (wActive) sel.innerHTML += `<option value="Wheel|5">🎡 Wheel Spin (5%)</option>`; 
        
        sel.innerHTML += `<option value="Promo|0">🎟️ Promo Code...</option>`; 
    } 
    
    applySingleDiscount(); 
    closeModal('cart-mod'); 
    openModal('co-mod'); 
    sPay('D17'); 
    
    let gWarn = el('guest-contact-warning');
    if (!user) { 
        if (gWarn) gWarn.style.display = 'block'; 
    } else { 
        if (gWarn) gWarn.style.display = 'none'; 
    } 
}

function adjTip(amt) { 
    let t = el('tip-admin-amt'); 
    if (!t) return; 
    
    let val = parseInt(t.value) + amt; 
    if (val < 0) val = 0; 
    t.value = val; 
    applySingleDiscount(); 
}

function applySingleDiscount() { 
    let selElem = el('co-disc-selector'); 
    if (!selElem) return; 
    
    let selVal = selElem.value.split('|'); 
    let type = selVal[0]; 
    let pct = parseFloat(selVal[1]); 
    
    let pBox = el('promo-input-box');
    
    if (type === "Promo") { 
        if (pBox) pBox.style.display = 'flex'; 
        pct = activeDiscount.type === "Promo" ? activeDiscount.pct : 0; 
    } else { 
        if (pBox) pBox.style.display = 'none'; 
        activeDiscount = { type: type, pct: pct, str: type + " Discount" }; 
    } 
    
    let r = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    let afterDiscount = r - (r * (activeDiscount.pct / 100)); 
    
    let tipElem = el('tip-admin-amt'); 
    let tipAmt = tipElem ? parseFloat(tipElem.value) || 0 : 0; 
    
    let feePct = 0; 
    if (payM === 'D17') feePct = 0.01; 
    if (payM === 'Mandat Minute') feePct = 0.02; 
    
    let feeAmt = afterDiscount * feePct; 
    
    let fDisp = el('fee-disp');
    let fAmt = el('fee-amt');
    let fPct = el('fee-pct');
    
    if (feePct > 0) { 
        if (fDisp) fDisp.style.display = 'block'; 
        if (fAmt) fAmt.innerText = feeAmt.toFixed(2); 
        if (fPct) fPct.innerText = (feePct * 100).toFixed(0); 
    } else { 
        if (fDisp) fDisp.style.display = 'none'; 
    } 
    
    let total = afterDiscount + feeAmt + tipAmt; 
    let cTot = el('co-tot');
    let cWal = el('co-wal-bal');
    
    if (cTot) cTot.innerText = total.toFixed(2) + " DT"; 
    if (cWal) cWal.innerText = userWallet.toFixed(2); 
}

async function validatePromoCode() { 
    let cInput = el('promo-code-val'); 
    if (!cInput) return; 
    
    let c = cInput.value.toUpperCase(); 
    if (!c) return; 
    
    showLoader("Checking Code..."); 
    let d = await api("validate_promo", { code: c }); 
    hideLoader(); 
    
    if (d && d.s === 'ok') { 
        activeDiscount = { type: "Promo", pct: parseFloat(d.pct), str: c }; 
        toast("Promo Applied!", false); 
        applySingleDiscount(); 
    } 
    else if (d && d.s === 'expired') { 
        toast("Code Expired", true); 
    } else { 
        toast("Invalid Code", true); 
    } 
}

function sPay(m) { 
    payM = m; 
    
    ['p-d17','p-mm','p-wal','p-later', 'p-cash-hl'].forEach(x => { 
        let e = el(x); 
        if (e) e.classList.remove('act');
    }); 
    
    let pD17 = el('p-d17');
    let pMM = el('p-mm');
    let pWal = el('p-wal');
    let pLater = el('p-later');
    let pCash = el('p-cash-hl');
    
    if (m === 'D17' && pD17) pD17.classList.add('act'); 
    else if (m === 'Mandat Minute' && pMM) pMM.classList.add('act'); 
    else if (m === 'Wallet' && pWal) pWal.classList.add('act'); 
    else if (m === 'Pay Later' && pLater) pLater.classList.add('act'); 
    else if (m === 'Cash Hammam-Lif' && pCash) pCash.classList.add('act'); 
    
    let dbox = el('d-box-pay'); 
    
    if (dbox) { 
        if (m === 'D17' || m === 'Mandat Minute' || m === 'Cash Hammam-Lif') { 
            dbox.style.display = 'block'; 
            
            let d17In = el('ui-d17-in');
            let qrD17 = el('qr-d17');
            let payInst = el('ui-pay-inst');
            let upWrap = el('upload-section-wrap');
            
            if (m === 'D17') { 
                if (d17In) d17In.innerText = window.CFG.D17; 
                if (qrD17) qrD17.style.display = 'block'; 
                if (payInst) payInst.innerText = "Transfer to D17:"; 
                if (upWrap) upWrap.style.display = 'block'; 
            } else if (m === 'Mandat Minute') { 
                if (d17In) d17In.innerHTML = `${window.CFG.M_NAME}<br>${window.CFG.M_NUM}`; 
                if (qrD17) qrD17.style.display = 'none'; 
                if (payInst) payInst.innerText = "Transfer to Mandat Minute:"; 
                if (upWrap) upWrap.style.display = 'block'; 
            } else if (m === 'Cash Hammam-Lif') { 
                if (d17In) d17In.innerHTML = `📍 Hammam-Lif Center`; 
                if (qrD17) qrD17.style.display = 'none'; 
                if (payInst) payInst.innerText = "Hand Delivery Location:"; 
                if (upWrap) upWrap.style.display = 'none'; 
            } 
        } else { 
            dbox.style.display = 'none'; 
        } 
    } 
    applySingleDiscount(); 
}

function dzOver(e) { 
    e.preventDefault(); 
    let dz = el('drop-zone'); 
    if (dz) dz.classList.add('active'); 
} 

function dzLeave() { 
    let dz = el('drop-zone'); 
    if (dz) dz.classList.remove('active'); 
} 

function dzDrop(e) { 
    e.preventDefault(); 
    dzLeave(); 
    if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]); 
    }
} 

function handleProofUpload(e) { 
    if (e.target.files.length) {
        handleFile(e.target.files[0]); 
    }
} 

function handleFile(f) { 
    let r = new FileReader(); 
    r.onload = ev => { 
        proofB64 = ev.target.result; 
        
        let dText = el('drop-text');
        if (dText) dText.innerText = "✅ Attached: " + f.name; 
        
        let dZone = el('drop-zone');
        if (dZone) dZone.classList.remove('flagged'); 
    }; 
    r.readAsDataURL(f); 
}

function generatePDF(orderId, name, contact, total, payM, discountStr) {
    if (typeof window.jspdf === 'undefined') return; 
    
    const { jsPDF } = window.jspdf; 
    const doc = new jsPDF();
    
    doc.setFontSize(18); 
    doc.setTextColor(0, 240, 255); 
    doc.text("CYBERHUB PREMIUM DIGITAL", 20, 20);
    
    doc.setFontSize(10); 
    doc.setTextColor(100, 100, 100); 
    doc.text(lang === 'fr' ? "Hammam-Lif, Tunisie" : "Hammam-Lif, Tunisia", 20, 28);
    
    if (db.sObj.email) doc.text("Email: " + db.sObj.email, 120, 20); 
    if (db.sObj.wa) doc.text("WhatsApp: " + db.sObj.wa, 120, 25); 
    if (db.sObj.ig) doc.text("Instagram: " + db.sObj.ig, 120, 30);
    
    doc.setTextColor(0, 0, 0); 
    doc.text("---------------------------------------------------------------------------", 20, 35);
    
    doc.setFontSize(12); 
    doc.text((lang === 'fr' ? "FACTURE N° : " : "INVOICE #: ") + orderId, 20, 45); 
    doc.text("DATE : " + new Date().toLocaleDateString(), 20, 52); 
    doc.text("CLIENT : " + name, 20, 59); 
    doc.text("CONTACT : " + contact, 20, 66); 
    doc.text("---------------------------------------------------------------------------", 20, 73);
    
    let y = 85; 
    doc.setFontSize(11);
    
    cart.forEach(i => { 
        let nStr = `${i.qty||1}x ${i.n} (ID: ${i.id})`; 
        if (nStr.length > 50) nStr = nStr.substring(0, 47) + "..."; 
        
        doc.text(nStr, 20, y); 
        doc.text(`${(i.finalPrice * (i.qty||1)).toFixed(2)} DT`, 160, y); 
        y += 10; 
        
        if (y > 270) { 
            doc.addPage(); 
            y = 20; 
        } 
    });
    
    doc.text("---------------------------------------------------------------------------", 20, y); 
    y += 10;
    
    doc.text((lang === 'fr' ? "SOUS-TOTAL : " : "SUBTOTAL : "), 20, y); 
    doc.text(cart.reduce((s,i) => s + (i.p*(i.qty||1)), 0).toFixed(2) + " DT", 160, y); 
    y += 10;
    
    if (activeDiscount.pct > 0) { 
        doc.text((lang === 'fr' ? "REDUCTION : " : "DISCOUNT : ") + `(${discountStr})`, 20, y); 
        doc.text("-" + (cart.reduce((s,i) => s + (i.p*(i.qty||1)), 0)*(activeDiscount.pct/100)).toFixed(2) + " DT", 160, y); 
        y += 10; 
    }
    
    doc.setFontSize(14); 
    doc.setTextColor(255, 0, 255); 
    doc.text((lang === 'fr' ? "TOTAL A PAYER : " : "TOTAL DUE : "), 20, y + 10); 
    doc.text(total + " DT", 160, y + 10);
    
    doc.setFontSize(10); 
    doc.setTextColor(150, 150, 150); 
    doc.text(lang === 'fr' ? "Merci pour votre confiance en CyberHub !" : "Thank you for trusting CyberHub!", 20, y + 30);
    
    doc.save(`CyberHub_Invoice_${orderId}.pdf`);
}

async function playTerminalAnimation() { 
    let t = el('terminal-ui'); 
    let txt = el('term-text'); 
    
    if (t) t.style.display = 'flex'; 
    if (txt) txt.innerHTML = ''; 
    
    let lines = [ 
        "> INITIALIZING SECURE HANDSHAKE...", 
        "> BYPASSING MAINFRAME FIREWALL...", 
        "> ENCRYPTING PAYMENT PROTOCOLS...", 
        "> INJECTING DATA TO DATABASE...", 
        "> 100% - TRANSACTION SUCCESSFUL." 
    ]; 
    
    for (let i = 0; i < lines.length; i++) { 
        if (txt) {
            txt.innerHTML += `<div class="term-line">${lines[i]}</div>`; 
        }
        await new Promise(r => setTimeout(r, 600)); 
    } 
    
    if (t) t.style.display = 'none'; 
}

async function finOrd() { 
    if (navigator.vibrate) navigator.vibrate(100); 
    
    let conInput = el('coN');
    let cocInput = el('coC');
    let contsInput = el('coNts');
    let methodInput = el('co-contact-method');
    
    let n = conInput ? conInput.value : ""; 
    let c = cocInput ? cocInput.value : ""; 
    let cm = contsInput ? contsInput.value : ""; 
    
    let cType = methodInput ? methodInput.value : "wa"; 
    let finalC = cType.includes('new') ? c : cType; 
    let actualType = cType.includes('ig') ? 'ig' : 'wa';
    
    if (!n || !finalC) {
        return toast("Full Name & Contact required", "error"); 
    }
    
    if (actualType === 'wa' && !/^\+?[0-9\s]+$/.test(finalC)) { 
        return toast(lang === 'fr' ? "Erreur: WhatsApp ne doit contenir que des chiffres." : "Error: WhatsApp must contain numbers only.", "error"); 
    }

    let txidInput = el('co-txid');
    let txid = txidInput ? txidInput.value.trim() : "";
    
    if ((payM === 'D17' || payM === 'Mandat Minute') && !proofB64 && !txid) { 
        return toast("Provide a Transaction ID or Upload Receipt", "error"); 
    }

    let missingBox = false;
    
    cart.forEach((i, idx) => {
        if (i.exReq) {
            let extVals = [];
            for (let j = 0; j < (i.exNum||1); j++) {
                let inp = el(`co-ex-${idx}-${j}`);
                if (!inp || !inp.value.trim()) {
                    missingBox = true;
                } else {
                    extVals.push(inp.value.trim());
                }
            }
            i.n += " [" + extVals.join(' | ') + "]"; 
            i.exReq = false; 
        }
    });
    
    if (missingBox) {
        return toast(lang === 'fr' ? "Veuillez remplir toutes les cases supplémentaires !" : "Please fill all extra detail boxes!", "error");
    }

    let r = cart.reduce((s, i) => s + (i.p * (i.qty||1)), 0); 
    let afterDiscount = r - (r * (activeDiscount.pct / 100)); 
    
    let tipInput = el('tip-admin-amt');
    let tipAmt = tipInput ? parseFloat(tipInput.value) : 0; 
    
    let feePct = 0; 
    if (payM === 'D17') feePct = 0.01; 
    if (payM === 'Mandat Minute') feePct = 0.02;
    
    let feeAmt = afterDiscount * feePct; 
    let total = afterDiscount + feeAmt + tipAmt; 
    
    cart.forEach(i => i.finalPrice = i.p - (i.p * (activeDiscount.pct / 100))); 
    
    if (tipAmt > 0) { 
        cart.push({ id: "TIP-001", n: "☕ Admin Coffee Tip", p: tipAmt, finalPrice: tipAmt, qty: 1 }); 
    } 
    
    if (feeAmt > 0) { 
        cart.push({ id: "FEE-001", n: "💳 Payment Processing Fee", p: feeAmt, finalPrice: feeAmt, qty: 1 }); 
    } 
    
    if (payM === 'Wallet' && userWallet < total) {
        return toast("Insufficient Wallet Balance", true); 
    }
    
    let bFin = el('b-fin');
    if (bFin) bFin.disabled = true; 
    
    await playTerminalAnimation();
    
    showLoader("Encrypting Order Payload...");
    
    try { 
        let payload = { 
            act: "place_order", 
            name: n, 
            contactType: actualType, 
            contactVal: finalC, 
            cart: cart, 
            discount: activeDiscount.str + " (" + activeDiscount.pct + "%)", 
            promoCode: activeDiscount.type === "Promo" ? activeDiscount.str : null, 
            payMethod: payM, 
            comments: cm, 
            email: user || "Guest", 
            txId: txid, 
            proofB64: proofB64, 
            total: total.toFixed(2), 
            lang: lang 
        }; 
        
        let d = await api("place_order", payload); 
        hideLoader();
        
        if (d && d.s === "ok") { 
            try { 
                if (db.sObj && db.sObj.s_succ) { 
                    new Audio(db.sObj.s_succ).play(); 
                } 
            } catch(e) {}
            
            if (payM === 'Wallet') { 
                userWallet -= total; 
                localStorage.setItem('ch_wal', userWallet); 
                chkUI(); 
            } 
            
            if (activeDiscount.type === "Streak") { 
                localStorage.setItem('ch_streak', 0); 
                loginStreak = 0; 
            } 
            
            if (activeDiscount.type === "Wheel") { 
                localStorage.setItem('ch_wheel_win', 'false'); 
            } 
            
            localStorage.setItem('ch_contact', finalC);
            
            let pdfCheck = el('dl-pdf');
            if (pdfCheck && pdfCheck.checked) { 
                try { 
                    generatePDF(d.gId, n, finalC, total.toFixed(2), payM, `${activeDiscount.str} ${activeDiscount.pct}%`); 
                } catch(e) {} 
            }
            
            let inv = `╔══════════════════════════════════╗\n║     💎 CYBERHUB ORDER TICKET     ║\n╚══════════════════════════════════╝\n👤 Client: ${n}\n🏷️ ID: ${d.gId}\n💰 Final Total: ${total.toFixed(2)} DT\n💳 Pay: ${payM}\n\n📦 **ITEMS ORDERED:**\n\n`; 
            
            cart.forEach((i, idx) => { 
                inv += `${idx + 1}. ${i.qty||1}x ${i.n}\n   🆔 ID: ${i.id}\n   💵 Final Price: ${(i.finalPrice * (i.qty||1)).toFixed(2)} DT\n`; 
                inv += `----------------------------------\n`; 
            }); 
            
            if (cm) {
                inv += `\n📝 Comments: ${cm}\n`; 
            }
            inv += `\n⏳ Our team will process this ticket\n   and contact you within 15-30 mins!`; 
            
            navigator.clipboard.writeText(inv).catch(e => {}); 
            
            try { 
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); 
            } catch(e) {} 
            
            let cForm = el('co-form');
            if (cForm) cForm.style.display = 'none'; 
            
            let cSucc = el('co-succ');
            if (cSucc) cSucc.style.display = 'block'; 
            
            let sGid = el('succ-gid');
            if (sGid) sGid.innerText = d.gId; 
            
            let contactClean = finalC.replace('@', '').replace(/\s+/g, ''); 
            let isPhone = /^\d+$/.test(contactClean) || contactClean.startsWith('+');
            
            let waBtn = el('dm-btn-wa');
            let igBtn = el('dm-btn-ig');
            
            if (actualType === 'wa' || isPhone) {
                if (igBtn) igBtn.style.display = 'none';
                if (waBtn) waBtn.onclick = () => window.open(`https://wa.me/${window.CFG.WA}?text=${encodeURIComponent(inv)}`);
            } else {
                if (waBtn) waBtn.style.display = 'none';
                if (igBtn) igBtn.onclick = () => window.open(`https://instagram.com/${db.sObj.ig ? String(db.sObj.ig).replace('@','') : '_yessine_ben_fraj_'}`);
            }
             
            cart = []; 
            localStorage.removeItem('ch_cart'); 
            
            let cCount = el('c-count');
            if (cCount) cCount.innerText = "0"; 
            
            if (user) uOrders++; 
            
        } else if (d && d.s === 'flagged') { 
            toast("Fraud Detected: Duplicate Receipt", "error"); 
            let dZone = el('drop-zone');
            if (dZone) dZone.classList.add('flagged'); 
            
            let dText = el('drop-text');
            if (dText) dText.innerText = "⚠️ FRAUD DETECTED: This receipt is already in our system."; 
            proofB64 = ""; 
        } else { 
            toast("Order execution failed.", true); 
        } 
        
        let bFinOut = el('b-fin');
        if (bFinOut) bFinOut.disabled = false; 
        
    } catch(e) { 
        hideLoader(); 
        let bFinErr = el('b-fin');
        if (bFinErr) bFinErr.disabled = false; 
        toast("System Error", true); 
    } 
}

async function trackOrdBtn() { 
    let tInp = el('track-inp');
    let id = tInp ? tInp.value.trim().toUpperCase() : ""; 
    
    if (!id) return toast("Enter Order ID", "error"); 
    
    showLoader("Fetching Secure Data..."); 
    let res = await api('track_order', {orderId: id}); 
    hideLoader(); 
    
    let tRes = el('track-res');
    
    if (res && res.success) { 
        let h = `Status: <b style="color:var(--w);">${res.status}</b><br>Total: ${res.total} DT`; 
        
        if (res.status === "Pending" && user) { 
            h += `<br><button class="btn" style="background:#ff4d4d; color:white; padding:8px; margin-top:8px; width:100%;" onclick="cancelOrd('${id}')">Cancel Order</button>`; 
        } 
        else if (res.status === "Pending") { 
            h += `<br><span style="color:gray; font-size:0.7rem;">Login to cancel.</span>`; 
        } 
        
        if (tRes) tRes.innerHTML = h; 
    } else { 
        if (tRes) tRes.innerHTML = "<span style='color:#ff4d4d;'>Order not found.</span>"; 
    } 
}

async function cancelOrd(id) { 
    if (!confirm("Abort this order?")) return; 
    
    showLoader("Aborting Order..."); 
    let res = await api('cancel_order', {orderId: id, userEmail: user, lang: lang}); 
    hideLoader(); 
    
    if (res && res.success) { 
        toast("Order Cancelled", "success"); 
        trackOrdBtn(); 
    } 
    else { 
        toast("Unauthorized to cancel.", "error"); 
    } 
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
