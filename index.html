<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub | Master Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>(function(){ emailjs.init("aVLHyVhILMDCu8T99"); })();</script>
    <style>
        :root { --primary: #00a8ff; --bg: #020617; --card: rgba(15, 23, 42, 0.95); --border: rgba(255,255,255,0.1); --text: #ffffff; --sub: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; overflow-y: auto; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .container { max-width: 500px; margin: auto; padding: 20px; position: relative; z-index: 1; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--primary); margin: auto; display: block; background: #000; }
        
        .social-bar { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .s-link { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; background: var(--card); border: 1px solid var(--border); font-size: 1.3rem; line-height: 1; }
        
        .item-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; flex-direction: column; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .add-btn:disabled { background: #1e293b !important; color: #64748b !important; cursor: not-allowed; opacity: 0.6; }
        .oos-tag { color: #ff4d4d; font-size: 0.7rem; font-weight: 800; border: 1px solid #ff4d4d; padding: 2px 4px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }

        #modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg); padding: 25px; border-radius: 24px; width: 90%; max-width: 480px; border: 1px solid var(--primary); text-align: center; max-height: 85vh; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.8rem; display: none; z-index: 3000; font-weight: bold; }
        footer { margin-top: 50px; text-align: center; font-size: 0.8rem; color: var(--sub); font-weight: bold; }
    </style>
</head>
<body>
<div id="particles-js"></div>
<div id="toast" class="toast">Order Info Copied! ❤️</div>

<div class="container">
    <div class="header" style="text-align:center;">
        <img src="https://drive.google.com/thumbnail?id=139ftYKuLVxgpGLxvCbJE6hq0m9rPIUkm&sz=w400" class="logo">
        <h2 style="color:var(--primary); margin-top:10px; letter-spacing: 2px;">CYBERHUB</h2>
    </div>

    <div class="social-bar">
        <a href="https://wa.me/21629895846" class="s-link">📞</a>
        <a href="https://www.instagram.com/__cyber__hub__" class="s-link">📸</a>
        <a href="mailto:cyber.hub.contact.now@gmail.com" class="s-link">📧</a>
    </div>

    <input type="text" id="mainSearch" placeholder="Search / Rechercher..." onkeyup="filterItems()" style="border-radius:15px;">
    <div id="content-area"></div>
    <div style="text-align:center; margin-top:20px; cursor:pointer; font-weight:bold; color:var(--primary);" onclick="openCart()">🛒 View Cart (<span id="cart-count">0</span>)</div>
    
    <footer>Made by Yessine Ben Fraj with ❤️</footer>
</div>

<div id="modal">
    <div class="modal-content">
        <div id="cart-view">
            <h3>🛒 Mon Panier</h3>
            <div id="cart-items-list" style="text-align:left; max-height:200px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="margin:15px 0; padding-top:10px; border-top:1px solid var(--border); font-weight:bold; display:flex; justify-content:space-between;">
                <span>Total:</span><span><span id="cart-total-price">0</span> DT</span>
            </div>
            <input type="text" id="custName" placeholder="Full Name / Nom">
            <input type="text" id="custContact" placeholder="Phone / Social Handle">
            <button class="add-btn" onclick="submitOrder()">Place Order & Copy ID</button>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--sub); margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>
</div>

<script>
    let productsData = { categories: [] };
    let cart = JSON.parse(localStorage.getItem('cyberhub_cart')) || [];
    let currentLang = "FR";

    particlesJS("particles-js", { "particles": { "number": { "value": 80 }, "size": { "value": 1.5 }, "line_linked": { "opacity": 0.2 }, "move": { "speed": 1.2 } } });

    async function fetchData() {
        try {
            const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRfkUtzcSKcO8fKFVvqCUGU221FL8_h2s3f3E6OXfMJJm3rYTTt_Foi9AurxvLquOFsBbW5h4VVyRF/pub?output=csv");
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            let temp = {};

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 6) {
                    const cat = { fr: cols[0], en: cols[6] || cols[0] };
                    const sub = { fr: cols[2], en: cols[7] || cols[2] };
                    const item = { 
                        fr: cols[4], en: cols[8] || cols[4], price: cols[5], 
                        showInput: cols[12] === "YES", inputPlaceholder: cols[13] || "...",
                        isOOS: (cols[14] && cols[14].toUpperCase() === "OOS")
                    };
                    if (!temp[cat.fr]) temp[cat.fr] = { name: cat, img: cols[1], apps: {} };
                    if (!temp[cat.fr].apps[sub.fr]) temp[cat.fr].apps[sub.fr] = { name: sub, img: cols[3], items: [] };
                    temp[cat.fr].apps[sub.fr].items.push(item);
                }
            });
            productsData.categories = Object.values(temp).map(c => { c.apps = Object.values(c.apps); return c; });
            showCats();
        } catch (e) { document.getElementById('content-area').innerHTML = "<p style='text-align:center; color:red;'>Error Loading Data.</p>"; }
    }

    function submitOrder() {
        const orderID = "CH-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        const name = document.getElementById('custName').value;
        const contact = document.getElementById('custContact').value;
        const total = document.getElementById('cart-total-price').innerText;
        const items = cart.map(i => `${i.name}`).join(' | ');

        // IMPROVED FORMAT FOR ZAPIER SEPARATION
        const body = `ORDER_ID: ${orderID}\nCLIENT: ${name}\nCONTACT: ${contact}\nITEMS: ${items}\nPRICE: ${total} DT`;

        navigator.clipboard.writeText(body).then(() => {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);

            emailjs.send("service_tjvcxv4", "template_r8b7yaf", {
                order_id: orderID,
                customer_name: name,
                message_body: body
            }).then(() => {
                alert(`Order ${orderID} Sent!`);
                cart = []; localStorage.removeItem('cyberhub_cart');
                location.reload();
            });
        });
    }

    function showCats() { 
        document.getElementById('content-area').innerHTML = `<div class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">${productsData.categories.map((c, i) => `<div class="nav-card" onclick="showApps(${i})"><img src="${c.img}" style="width:60px; margin-bottom:5px;"><br>${c.name.fr}</div>`).join('')}</div>`; 
    }
    function showApps(idx) {
        const c = productsData.categories[idx];
        document.getElementById('content-area').innerHTML = `<button onclick="showCats()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:10px;">← Back</button><div class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">${c.apps.map((a, i) => `<div class="nav-card" onclick="showItems(${idx}, ${i})"><img src="${a.img}" style="width:50px;"><br>${a.name.fr}</div>`).join('')}</div>`;
    }
    function showItems(cI, aI) {
        const a = productsData.categories[cI].apps[aI];
        document.getElementById('content-area').innerHTML = `<button onclick="showApps(${cI})" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:10px;">← Back</button>${a.items.map((it, i) => `<div class="item-row"><span>${it.fr} ${it.isOOS ? '<span class="oos-tag">OOS</span>' : ''}</span><b style="color:var(--primary);">${it.price} DT</b><button class="add-btn" onclick="addToCart(${cI},${aI},${i})" ${it.isOOS ? 'disabled' : ''} style="margin-top:10px;">${it.isOOS ? 'OUT OF STOCK' : 'ADD TO CART'}</button></div>`).join('')}`;
    }
    function addToCart(c,a,i) { 
        const item = productsData.categories[c].apps[a].items[i];
        cart.push({name: item.fr, price: parseFloat(item.price)});
        document.getElementById('cart-count').innerText = cart.length;
        localStorage.setItem('cyberhub_cart', JSON.stringify(cart));
    }
    function openCart() { 
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('cart-items-list').innerHTML = cart.map(i => `<div>• ${i.name} (${i.price} DT)</div>`).join('');
        document.getElementById('cart-total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleLang() { currentLang = currentLang === "FR" ? "EN" : "FR"; fetchData(); }

    fetchData();
    document.getElementById('cart-count').innerText = cart.length;
</script>
</body>
</html>
